rect":false}],"is_open":false,"open_answer":null,"page":56},{"id":"2.142","question":"Eine Langwaffe wird unzulässigerweise bearbeitet, wenn Sie ohne Erlaubnis...","options":[{"letter":"a","text":"den Gewehrlauf kürzen.","correct":true},{"letter":"b","text":"eine Schaftkappe montieren.","correct":false},{"letter":"c","text":"die Griffschalen austauschen.","correct":false}],"is_open":false,"open_answer":null,"page":56},{"id":"2.143","question":"Eine Kurzwaffe wird von Ihnen unzulässigerweise bearbeitet, wenn ohne Erlaubnis...","options":[{"letter":"a","text":"der Lauf mit Kompensatorbohrungen versehen wird.","correct":true},{"letter":"b","text":"ein Balkenkorn eingesetzt wird.","correct":false}],"is_open":false,"open_answer":null,"page":56},{"id":"2.144","question":"Darf zugelassene pyrotechnische Munition im Aufbau verändert werden?","options":[],"is_open":true,"open_answer":"Nein","page":56},{"id":"2.145","question":"Wenn ein Mitglied, das als Sportschütze eine waffenrechtliche Erlaubnis besitzt, aus dem Schießsportverein austritt, muss der Verein ...","options":[{"letter":"a","text":"den Austritt unverzüglich der zuständigen Behörde melden.","correct":true},{"letter":"b","text":"die Waffen des Mitgliedes in Verwahrung nehmen.","correct":false},{"letter":"c","text":"nichts tun.","correct":false}],"is_open":false,"open_answer":null,"page":56},{"id":"2.146","question":"Dürfen Sorgeberechtigte minderjährige Schützen beim Schießbetrieb beaufsichtigen?","options":[{"letter":"a","text":"Ja, wenn sie zur Standaufsicht berechtigt sind, dürfen sie ihre Kinder beaufsichtigen.","correct":true},{"letter":"b","text":"Nein, das dürfen nur in der Kinderund Jugendarbeit ausgebildete Obhutspersonen.","correct":false},{"letter":"c","text":" Ja, Sorgeberechtigte dürfen alle minderjährigen Schützen beim Schießbetrieb beaufsichtigen.","correct":false}],"is_open":false,"open_answer":null,"page":56},{"id":"2.147","question":"Was hat ein schießsportlicher Verein eines anerkannten Schießsportverbandes im Hinblick auf die Aufsicht zu beachten?","options":[{"letter":"a","text":"Aufsichtspersonen im Verein registrieren.","correct":true},{"letter":"b","text":"Voraussetzungen der Sachkunde prüfen.","correct":true},{"letter":"c","text":"Ein Nachweisdokument ausstellen.","correct":true}],"is_open":false,"open_answer":null,"page":57},{"id":"2.148","question":"Ab welchem Alter dürfen Kinder und Jugendliche mit Druckluft-, Federdruckoder CO -Waffen schießen 2 und was ist dabei zu beachten?","options":[{"letter":"a","text":"Ab 12 Jahren, wenn die Sorgeberechtigten schriftlich oder elektronisch dabei sind.","correct":false},{"letter":"b","text":"Ab 12 Jahren, sofern die Personensorgeberechtigten ihr Einverständnis erklärt haben und eine geeignete Aufsichtsperson zur Betreuung vorhanden ist.","correct":true},{"letter":"c","text":"Ab 12 Jahren, wenn die Sorgeberechtigten schriftlich oder elektronisch ihr Einverständnis erklärt haben.","correct":false}],"is_open":false,"open_answer":null,"page":57},{"id":"2.149","question":"Wer darf auf einer Schießstätte Aufsicht führen?","options":[{"letter":"a","text":"Alle Vereinsmitglieder","correct":false},{"letter":"b","text":"Der Eigentümer der Schießstätte","correct":false},{"letter":"c","text":"Alle vom Betreiber bestellten Personen.","correct":true}],"is_open":false,"open_answer":null,"page":57},{"id":"2.150","question":"Wer darf die Schießaufsicht ausüben?","options":[],"is_open":true,"open_answer":"Der Aufsichtsberechtigte muss volljährig, zuverlässig, persönlich geeignet und sachkundig sowie zur Aufsicht bestellt sein.","page":57},{"id":"2.151","question":"Darf eine Aufsicht selbst am Schießen teilnehmen?","options":[],"is_open":true,"open_answer":"Nein","page":57},{"id":"2.152","question":"Welche Anforderungen werden an die verantwortliche Aufsichtsperson gestellt?","options":[{"letter":"a","text":"Volljährigkeit, persönliche Eignung","correct":true},{"letter":"b","text":"Zuverlässigkeit, Sachkunde","correct":true},{"letter":"c","text":"Bei Aufsicht über Minderjährige die Eignung für Kinderund Jugendarbeit","correct":true}],"is_open":false,"open_answer":null,"page":57},{"id":"2.153","question":"Was zählt zu den Aufgaben der verantwortlichen Aufsichtsperson?","options":[{"letter":"a","text":"Dafür Sorge zu tragen, dass von den Schützen und ihren Waffen keine Gefahr ausgeht.","correct":true},{"letter":"b","text":"Die Betreuung von Zuschauern und Gästen.","correct":false},{"letter":"c","text":"Überprüfen, ob der Verbandskasten aufgefüllt ist.","correct":false}],"is_open":false,"open_answer":null,"page":58},{"id":"2.154","question":"Nennen sie mindestens vier Pflichten der verantwortlichen Aufsichtsperson beim Schießen!","options":[],"is_open":true,"open_answer":"Das Schießen ständig beaufsichtigen, insbesondere dafür zu sorgen, dass nur mit für die Schießstätte zugelassenen Waffen und Munition geschossen wird, sicherzustellen, dass nur Kinder und Jugendliche ab den vorgeschriebenen Altersgrenzen und mit den altersmäßig zugelassenen Waffen teilnehmen und die dafür eventuell notwendigen Einverständniserklärungen der Personensorgeberechtigten aufbewahren und der zuständigen Behörde auf Verlangen aushändigen. Dafür Sorge tragen, dass die in der Schießstätte anwesenden Personen durch ihr Verhalten keine vermeidbaren Gefahren verursachen.","page":58},{"id":"3.01","question":"Bei welchen Dekorationswaffen ist kein Zulassungszeichen (Ortszeichen des Beschussamtes in der Raute) erforderlich?","options":[{"letter":"a","text":"Bei allen offensichtlich unbrauchbaren und nicht mehr schussfähigen Waffen, die vor dem 01.01.1970 hergestellt wurden.","correct":false},{"letter":"b","text":"Bei allen Schusswaffen, die vor dem 01.04.2003 nach dem damals geltenden Waffenrecht unbrauchbar gemacht wurden.","correct":true},{"letter":"c","text":"Bei allen Schusswaffen, deren Modell vor dem 01.01.1871 hergestellt oder entwickelt wurde.","correct":false}],"is_open":false,"open_answer":null,"page":59},{"id":"3.02","question":"Welches Kennzeichen muss u.a. auf einem Großkaliber-Revolver angebracht sein?","options":[{"letter":"a","text":"Bezeichnung der Munition","correct":true},{"letter":"b","text":"Herstellerzeichen","correct":true},{"letter":"c","text":"Warnhinweis „Gefährlich…“","correct":false}],"is_open":false,"open_answer":null,"page":59},{"id":"3.03","question":"Welche Kennzeichnung trägt üblicherweise eine Feuerwaffe?","options":[{"letter":"a","text":"Name des Besitzers","correct":false},{"letter":"b","text":"Beschusszeichen","correct":true},{"letter":"c","text":"Lauflänge","correct":false}],"is_open":false,"open_answer":null,"page":59},{"id":"3.04","question":"Welche Kennzeichnung trägt üblicherweise eine Schusswaffe?","options":[{"letter":"a","text":"Name, Firma oder Marke eines Waffenherstellers oder -händlers, der im Geltungsbereich dieses Gesetzes eine gewerbliche Niederlassung hat.","correct":true},{"letter":"b","text":"Landeskürzel des Herstellungslandes","correct":true},{"letter":"c","text":"die Bezeichnung der Munition; sofern keine Munition verwendet wird, die Bezeichnung der Geschosse","correct":true},{"letter":"d","text":"Beschusszeichen","correct":true},{"letter":"e","text":"Herstellungsnummer","correct":true},{"letter":"f","text":"bei Importwaffen unter anderem auch Einfuhrland (Länderkürzel) und Einfuhrjahr.","correct":true}],"is_open":false,"open_answer":null,"page":59},{"id":"3.05","question":"Welche der nebenstehenden Kennzeichen sind nicht auf einer waffenbesitzkartenpflichtigen Schusswaffe zu finden?","options":[{"letter":"a","text":"","correct":true},{"letter":"b","text":" seit 20.10.2014:","correct":false},{"letter":"c","text":"","correct":true}],"is_open":false,"open_answer":null,"page":60},{"id":"3.06","question":"Wie sind Schreckschuss-, Reizstoffund Signalwaffen gekennzeichnet, deren Erwerb und Besitz erlaubnisfrei ist?","options":[],"is_open":true,"open_answer":"Durch das Zulassungszeichen „PTB im Kreis“ (PTB = Physikalisch-Technische Bundesanstalt).","page":60},{"id":"3.07","question":"Welche Kennzeichnung muss eine erlaubnispflichtige Feuerwaffe mindestens aufweisen?","options":[{"letter":"a","text":"Herstelleroder Händlerzeichen, Seriennummer, Modell, Bezeichnung der Munition","correct":false},{"letter":"b","text":"Herstelleroder Händlerzeichen, Herstellungsland (Länderkürzel), Seriennummer, Beschusszeichen, Bezeichnung der Munition, bei Importwaffen unter anderem auch Einfuhrland (Landeskürzel) und Einfuhrjahr","correct":true},{"letter":"c","text":"Herstelleroder Händlerzeichen, Seriennummer, Herstellungsjahr, Bezeichnung der Munition","correct":false}],"is_open":false,"open_answer":null,"page":60},{"id":"3.08","question":"Welche Kennzeichen müssen auf der kleinsten Verpackungseinheit von Patronen angebracht sein?","options":[{"letter":"a","text":"Herstelleroder Fertigungszeichen, Fertigungsserie, Patronendaten, Zulassungszeichen","correct":true},{"letter":"b","text":"Herstellungsdatum, Patronenkaliber","correct":false},{"letter":"c","text":"keine","correct":false}],"is_open":false,"open_answer":null,"page":60},{"id":"3.09","question":"Handfeuerwaffen müssen Beschusszeichen tragen. Was wird geprüft?","options":[],"is_open":true,"open_answer":"Haltbarkeit, Funktionssicherheit, Maßhaltigkeit und richtige Kennzeichnung.","page":60},{"id":"3.10","question":"Welche Waffenteile unterliegen, bei Einfuhr in den Geltungsbereich des Waffengesetzes, der Kennzeichnungspflicht des § 24 Abs. 1 des Waffengesetzes?","options":[{"letter":"a","text":"Mindestens ein wesentliches Waffenteil muss entsprechend den gesetzlichen Vorgaben gekennzeichnet sein.","correct":false},{"letter":"b","text":"Alle wesentlichen Waffenteile müssen entsprechend den gesetzlichen Vorgaben gekennzeichnet sein.","correct":true},{"letter":"c","text":"Es ist ausreichend wenn sich eine Seriennummer auf dem Lauf der Waffe befindet.","correct":false}],"is_open":false,"open_answer":null,"page":61},{"id":"3.11","question":"Welche Kennzeichnung muss die Randfeuerpatrone aufweisen?","options":[{"letter":"a","text":"Kaliberangabe auf der Hülse","correct":false},{"letter":"b","text":"Herstellerzeichen auf der Hülse","correct":true},{"letter":"c","text":"Kaliber und Herstellerzeichen auf der Hülse","correct":false}],"is_open":false,"open_answer":null,"page":61},{"id":"3.12","question":"Welche Kennzeichnung muss die Zentralfeuerpatrone aufweisen?","options":[{"letter":"a","text":"Kaliberangabe und Geschossart auf dem Hülsenboden","correct":false},{"letter":"b","text":"Herstellerzeichen auf dem Hülsenhals","correct":false},{"letter":"c","text":"Herstellerzeichen und Bezeichnung der Munition auf der Hülse","correct":true}],"is_open":false,"open_answer":null,"page":61},{"id":"3.13","question":"Was bedeutet der Zusatz „R“ in der Munitionsbezeichnung?","options":[{"letter":"a","text":"Patrone mit Rand","correct":true},{"letter":"b","text":"Randfeuerpatrone","correct":false},{"letter":"c","text":"Patrone für Revolver (R = Revolver)","correct":false}],"is_open":false,"open_answer":null,"page":61},{"id":"3.14","question":"Welche zusätzlichen Angaben müssen Schrotpatronen im Kaliber 12/70 aufweisen?","options":[{"letter":"a","text":"keine zusätzlichen Angaben erforderlich","correct":false},{"letter":"b","text":"auf der Hülse die Längenangabe 70","correct":true},{"letter":"c","text":"Angabe der Anzahl der Schrote","correct":false}],"is_open":false,"open_answer":null,"page":61},{"id":"3.15","question":"Welche Kennzeichen müssen auf Zentralfeuermunition angebracht sein?","options":[],"is_open":true,"open_answer":"Auf der Hülse der Munition müssen das Herstellerzeichen und die Bezeichnung der Munition angebracht sein.","page":61},{"id":"3.16","question":"Welche Kennzeichen müssen auf der kleinsten Verpackungseinheit der Munition angebracht sein?","options":[],"is_open":true,"open_answer":"das Herstellerzeichen das Fertigungszeichen (Fertigungsserie) die Bezeichnung der Munition Zulassungszeichen","page":62},{"id":"3.17","question":"Welche Kennzeichnung muss auf einer Randfeuerpatrone angebracht sein?","options":[{"letter":"a","text":"Bezeichnung der Munition","correct":false},{"letter":"b","text":"Randfeuer","correct":false},{"letter":"c","text":"Herstellerzeichen","correct":true}],"is_open":false,"open_answer":null,"page":62},{"id":"3.18","question":"Welche Kennzeichen müssen auf der kleinsten Munitionsverpackungseinheit angebracht sein?","options":[{"letter":"a","text":"Herstellerzeichen, Bezeichnung der Munition, Anzahl der Patronen in der Packung, Fertigungsserie (Losnummer), Zulassungszeichen","correct":true},{"letter":"b","text":"Herstellerzeichen, Bezeichnung der Munition, Anzahl der Patronen in der Packung, Herstellungsjahr, Zulassungszeichen","correct":false},{"letter":"c","text":"Herstellerzeichen, Bezeichnung der Munition, Anzahl der Patronen in der Packung, Fertigungsserie (Losnummer), Herstellungsdatum","correct":false}],"is_open":false,"open_answer":null,"page":62},{"id":"3.19","question":"Welche Kennzeichnung muss auf einer Zentralfeuerpatrone angebracht sein?","options":[{"letter":"a","text":"Bezeichnung der Munition und Geschossart","correct":false},{"letter":"b","text":"Bezeichnung der Munition und Herstellerzeichen","correct":true},{"letter":"c","text":"Bezeichnung der Munition und Losnummer","correct":false}],"is_open":false,"open_answer":null,"page":62},{"id":"3.20","question":"Welche Bedeutung hat ein Beschusszeichen?","options":[{"letter":"a","text":"Sicherheitsüberprüfung der Waffe beim zuständigen TÜV","correct":false},{"letter":"b","text":"Die Waffe ist durch die PhysikalischTechnische Bundesanstalt auf Funktionsfähigkeit geprüft.","correct":false},{"letter":"c","text":"Die Waffe ist auf Haltbarkeit, Funktionssicherheit, Maßhaltigkeit und richtige Kennzeichnung durch ein anerkanntes Beschussamt geprüft.","correct":true}],"is_open":false,"open_answer":null,"page":62},{"id":"3.21","question":"Woran erkennt man, ob eine Schusswaffe zum Schießen zugelassen ist?","options":[],"is_open":true,"open_answer":"Die Waffe muss ein gültiges Prüfund/oder Beschusszeichen tragen.","page":63},{"id":"3.22","question":"Wann ist eine Schusswaffe erneut zum Beschuss vorzulegen?","options":[],"is_open":true,"open_answer":"Wenn ein wesentliches Teil ausgetauscht, verändert oder instandgesetzt worden ist.","page":63},{"id":"3.23","question":"Auf welchem Waffenteil muss das Beschusszeichen auch angebracht sein?","options":[{"letter":"a","text":"Auf dem Lauf","correct":true},{"letter":"b","text":"Auf dem Schaft","correct":false},{"letter":"c","text":"Auf dem Visier","correct":false}],"is_open":false,"open_answer":null,"page":63},{"id":"3.24","question":"Welches Beschusszeichen trägt ein in der Bundesrepublik beschossener Revolver .357 Magnum?","options":[{"letter":"a","text":"Bundesadler V / CIP S seit 20.10.2014","correct":false},{"letter":"b","text":"Bundesadler N / CIP N seit 20.10.2014","correct":true},{"letter":"c","text":"Bundesadler SP / CIP PN seit 20.10.2014","correct":false}],"is_open":false,"open_answer":null,"page":63},{"id":"3.25","question":"Was bedeutet das Beschusszeichen Bundesadler N bzw. CIP N? seit 20.10.2014","options":[{"letter":"a","text":"Die Waffe ist behördlich geprüft und zum Schießen zugelassen.","correct":true},{"letter":"b","text":"Die Gebühren sind bezahlt.","correct":false},{"letter":"c","text":"Die Waffe ist gebraucht.","correct":false}],"is_open":false,"open_answer":null,"page":63},{"id":"3.26","question":"Welche Schusswaffe muss ein amtliches Beschusszeichen tragen?","options":[{"letter":"a","text":"Ein jetzt hergestellter Nachbau einer Steinschlosspistole (Original 18. Jhdt.)","correct":true},{"letter":"b","text":"Ein Druckluftgewehr, das dem Geschoss eine Energie von ca. 10 Joule erteilt.","correct":false},{"letter":"c","text":"Ordonnanzgewehr aus dem 2. Weltkrieg","correct":true},{"letter":"d","text":"Bauartgeprüfter Schreckschussrevolver im Kaliber bis 6 mm","correct":false}],"is_open":false,"open_answer":null,"page":63},{"id":"3.27","question":"Welche Beschussstempelung trägt üblicherweise eine in der Bundesrepublik Deutschland beschossene Schusswaffe?","options":[{"letter":"a","text":"Beschusszeichen in Form eines Bundesadlers (seit 20.10.2014 CIP-Zeichen) mit darunter liegendem Kennbuchstaben für die Art des Beschusses.","correct":true},{"letter":"b","text":"Ortszeichen für das Beschussamt","correct":true},{"letter":"c","text":"Zahlen oder Buchstabencodierung für das Beschussdatum","correct":true}],"is_open":false,"open_answer":null,"page":64},{"id":"3.28","question":"Welche Bedeutung hat ein Beschusszeichen, bei dem ein Bundesadler (seit 20.10.2014 CIP-Zeichen) mit den darunter liegenden Buchstaben „PN“ abgebildet ist?","options":[{"letter":"a","text":"Die Waffe ist für das Schießen mit allen Munitionssorten (Schwarzpulver und rauchloses Pulver) im entsprechenden Kaliber zugelassen. (PN = Prüfung Normal)","correct":false},{"letter":"b","text":"Die Waffe ist für das Schießen mit allen Munitionssorten im entsprechenden Kaliber zugelassen, die mit rauchlosem Pulver geladen sind. (PN = Prüfung Nitro)","correct":false},{"letter":"c","text":"Die Waffe ist für das Schießen mit allen Munitionssorten im entsprechenden Kaliber zugelassen, die mit Schwarzpulver geladen sind. (PN = poudre noir)","correct":true}],"is_open":false,"open_answer":null,"page":64},{"id":"3.29","question":"Was wird bei einem amtlichen Beschuss geprüft?","options":[{"letter":"a","text":"Die Waffe wird auf Haltbarkeit, Funktionssicherheit, Maßhaltigkeit und Kennzeichnung geprüft.","correct":true},{"letter":"b","text":"Die Waffe wird auf Lebensdauer, Konstruktionsschlüssigkeit und Funktionstauglichkeit geprüft.","correct":false},{"letter":"c","text":"Die Waffe wird auf Präzision, Fertigungstoleranzen und Materialhärte geprüft.","correct":false}],"is_open":false,"open_answer":null,"page":64},{"id":"3.30","question":"Auf welchen Waffenteilen muss das Beschusszeichen (auch) angebracht sein?","options":[{"letter":"a","text":"Lauf, Verschluss","correct":true},{"letter":"b","text":"Schaft, Visier","correct":false},{"letter":"c","text":"Sicherung, Magazin","correct":false}],"is_open":false,"open_answer":null,"page":64},{"id":"3.31","question":"Welche der folgenden Waffenteile unterliegen der Beschusspflicht?","options":[{"letter":"a","text":"Einsteckläufe für Zentralfeuerpatronen","correct":true},{"letter":"b","text":"Wechseltrommeln","correct":true},{"letter":"c","text":"Wechselsysteme","correct":true}],"is_open":false,"open_answer":null,"page":65},{"id":"3.32","question":"Werden in Deutschland auch Beschusszeichen anderer Staaten anerkannt?","options":[{"letter":"a","text":"Ja, aller Staaten, die eine Sicherheitsprüfung vorschreiben.","correct":false},{"letter":"b","text":"Ja, aber nur Staaten, die dem Übereinkommen über die gegenseitige Anerkennung von Beschusszeichen und Prüfzeichen beigetreten sind (C.I.P.).","correct":true},{"letter":"c","text":"Nein, alle Schusswaffen müssen vor ihrem Gebrauch von deutschen Beschussämtern geprüft sein.","correct":false}],"is_open":false,"open_answer":null,"page":65},{"id":"3.33","question":"Bei welchen der folgenden ehemaligen Staaten ist der dortige amtliche Beschuss auch in der Bundesrepublik Deutschland weiterhin gültig? (D.h. die dort beschossenen Waffen müssen nicht von einem deutschen Beschussamt erneut beschossen werden.)","options":[{"letter":"a","text":"CSSR","correct":true},{"letter":"b","text":"DDR","correct":true},{"letter":"c","text":"Deutsches Reich (sollte sich ein Hakenkreuz auf der Waffe befinden, müsste das Hakenkreuz vom Beschussamt mit einem „X“ versehen werden)","correct":true}],"is_open":false,"open_answer":null,"page":65},{"id":"3.34","question":"Welche Schusswaffe muss neben dem Zulassungszeichen „F im Fünfeck“ noch als weiteres Zulassungszeichen „PTB im Quadrat“ tragen? (PTB = Physikalisch-Technische Bundesanstalt)","options":[{"letter":"a","text":"Druckluftwaffen mit einer Bewegungsenergie bis zu 7,5 Joule.","correct":false},{"letter":"b","text":"Schusswaffen mit kleinerem Kaliber als .22lr und einer Bewegungsenergie bis zu 10 Joule.","correct":false},{"letter":"c","text":"Feuerwaffen, deren Geschossen eine Bewegungsenergie von nicht mehr als 7,5 Joule erteilt wird.","correct":true}],"is_open":false,"open_answer":null,"page":65},{"id":"3.35","question":"Welche Bedeutung hat das Zeichen „F im Fünfeck“?","options":[{"letter":"a","text":"Das Zeichen „F im Fünfeck“ kennzeichnet Waffen, die von volljährigen Personen erlaubnisfrei erworben werden dürfen.","correct":false},{"letter":"b","text":"Das Zeichen „F im Fünfeck“ kennzeichnet Waffen, deren Geschossenergie E0 maximal 7,5 Joule beträgt.","correct":true},{"letter":"c","text":"Das Zeichen „F im Fünfeck“ kennzeichnet Waffen, deren Mündungsgeschwindigkeit unter 7,5 m/s. liegt.","correct":false}],"is_open":false,"open_answer":null,"page":66},{"id":"4.01","question":"Wo darf eine erlaubnispflichtige Kurzwaffe gelagert werden?","options":[{"letter":"a","text":"In einem Waffenschrank der Sicherheitsstufe A nach VDMA 24992, sofern sich keine dazu passende Munition im Schrank befindet.","correct":false},{"letter":"b","text":"In einem Waffenschrank der Sicherheitsstufe B nach VDMA 24992, sofern sich keine dazu passende Munition im Schrank befindet wenn der Schrank bereits vor dem 06.07.2017 rechtmäßig vom Betroffenen zur Waffenaufbewahrung genutzt wurde.","correct":true},{"letter":"c","text":"In einem Waffenschrank der Norm DIN/EN 11431 mit dem Widerstandsgrad 0.","correct":true}],"is_open":false,"open_answer":null,"page":67},{"id":"4.02","question":"Welchem Sicherheitsstandard muss ein Waffenschrank mindestens entsprechen, damit Waffen und dazu passende Munition zusammen darin aufbewahrt werden dürfen?","options":[{"letter":"a","text":"Sicherheitsstufe B nach VDMA 24992, Schrankgewicht über 200kg","correct":false},{"letter":"b","text":"DIN/EN 11431 Widerstandsgrad 0","correct":true},{"letter":"c","text":"DIN/EN 11431 Widerstandsgrad I","correct":false}],"is_open":false,"open_answer":null,"page":67},{"id":"4.03","question":"In welchem Behältnis darf erlaubnispflichtige Munition gelagert werden?","options":[{"letter":"a","text":"Wohnzimmerschrank mit Sicherheitsschloss","correct":false},{"letter":"b","text":"Blechschrank mit Vorhängeschloss","correct":false},{"letter":"c","text":"Stahlblechbehältnis mit Schwenkriegelschloss","correct":true}],"is_open":false,"open_answer":null,"page":67},{"id":"4.04","question":"Darf die Erlaubnisbehörde gegen den Willen des Erlaubnisinhabers dessen Wohnräume betreten, um die ordnungsgemäße Waffenaufbewahrung zu überprüfen?","options":[{"letter":"a","text":"Ja, dies ist stets zulässig.","correct":false},{"letter":"b","text":"Ja, sofern eine dringende Gefahr für die öffentliche Sicherheit besteht.","correct":true},{"letter":"c","text":"Ja, aber nur mit einem richterlichen Durchsuchungsbefehl.","correct":false}],"is_open":false,"open_answer":null,"page":67},{"id":"4.05","question":"Schusswaffen sind aufzubewahren...","options":[{"letter":"a","text":"an einem versteckten Ort.","correct":false},{"letter":"b","text":"nur bei der Erlaubnisbehörde.","correct":false},{"letter":"c","text":"in einem Behältnis der entsprechenden Sicherheitsstufe.","correct":true}],"is_open":false,"open_answer":null,"page":67},{"id":"4.06","question":"Wo müssen erlaubnispflichtige Schusswaffen und Munition aufbewahrt werden?","options":[{"letter":"a","text":"Im Kleiderschrank","correct":false},{"letter":"b","text":"In einer verschlossenen und alarmgesicherten Familienwohnung.","correct":false},{"letter":"c","text":"In einem Behältnis der entsprechenden Sicherheitsstufe.","correct":true}],"is_open":false,"open_answer":null,"page":68},{"id":"4.07","question":"Gegen unbefugten Zugriff ist eine erlaubnispflichtige Pistole zu Hause gesichert, wenn sie…","options":[{"letter":"a","text":"versteckt im Bücherregal liegt.","correct":false},{"letter":"b","text":"im abgeschlossenen Waffenkoffer im Schrank aufbewahrt wird.","correct":false},{"letter":"c","text":"in einem Behältnis der Norm DIN/EN 1143-1 Widerstandsgrad 0 oder I aufbewahrt wird.","correct":true}],"is_open":false,"open_answer":null,"page":68},{"id":"4.08","question":"Gegen unbefugten Zugriff ist eine erlaubnispflichtige Langwaffe gesichert, wenn sie...","options":[{"letter":"a","text":"sich in einem abgeschlossenen Waffenschrank der Norm DIN/EN 1143-1 Widerstandsgrad 0 oder I befindet.","correct":true},{"letter":"b","text":"im Gewehrständer steht.","correct":false},{"letter":"c","text":"an der Wand hängt und mit einem Schloss gesichert ist.","correct":false}],"is_open":false,"open_answer":null,"page":68},{"id":"4.09","question":"Sind Sie in Bezug auf die sichere Verwahrung ihrer Waffe(n) oder Munition zur Auskunft gegenüber der Behörde verpflichtet?","options":[{"letter":"a","text":"Es besteht keine Pflicht zum Nachweis über die sichere Verwahrung.","correct":false},{"letter":"b","text":"Ja, wer Waffen oder Munition besitzt, hat der zuständigen Behörde die zur sicheren Verwahrung getroffenen Maßnahmen nachzuweisen.","correct":true},{"letter":"c","text":"Nein, nur wenn mehr als 10 Schusswaffen im Besitz sind.","correct":false}],"is_open":false,"open_answer":null,"page":68},{"id":"4.10","question":"Wozu kann die nicht ordnungsgemäße Aufbewahrung von Waffen oder Munition u.a. führen?","options":[],"is_open":true,"open_answer":"Zum Verlust der waffenrechtlichen Zuverlässigkeit.","page":68},{"id":"4.11","question":"Ist die gemeinschaftliche Aufbewahrung von Waffen oder Munition durch berechtigte Personen, die in einer häuslichen Gemeinschaft leben, zulässig?","options":[{"letter":"a","text":"Ja","correct":true},{"letter":"b","text":"Nein","correct":false}],"is_open":false,"open_answer":null,"page":68},{"id":"4.12","question":"Wozu kann die nicht ordnungsgemäße Aufbewahrung von Waffen oder Munition u.a. führen?","options":[{"letter":"a","text":"Eine nicht ordnungsgemäße Aufbewahrung von Waffen stellt einen Straftatbestand im Sinne des Waffengesetzes dar.","correct":true},{"letter":"b","text":"Verlust der persönlichen Eignung","correct":false},{"letter":"c","text":"Die nicht ordnungsgemäße Aufbewahrung von Waffen stellt lediglich einen Ordnungswidrigkeitentatbestand dar.","correct":false}],"is_open":false,"open_answer":null,"page":69},{"id":"4.13","question":"Wie können Waffen und Munition außerhalb der Wohnung, z.B. bei Hotelübernachtung anlässlich eines Wettkampfes, sicher aufbewahrt werden?","options":[{"letter":"a","text":"Die Schusswaffe/n ist/sind immer am Körper zu tragen.","correct":false},{"letter":"b","text":"Ein wesentlicher Teil der Schusswaffe/n ist zu entnehmen und mit sich zu führen. Der Rest der Schusswaffe ist gegen unbefugten Zugriff zu sichern.","correct":true},{"letter":"c","text":"Aufbewahrung in einem Transportbehältnis oder in einem verschlossenen Schrank oder einem sonstigen verschlossenen Behältnis.","correct":true}],"is_open":false,"open_answer":null,"page":69},{"id":"4.14","question":"Wie sind bei einem Transport von Waffen und Munition in einem Fahrzeug diese bei kurzfristigem Verlassen des Fahrzeuges (Einnahme des Mittagessens, Tanken, Schüsseltreiben, Einkäufe etc.) aufzubewahren?","options":[{"letter":"a","text":"Waffen und Munition sind in dem verschlossenen Fahrzeug so aufzubewahren, dass keine unmittelbaren Rückschlüsse auf die Art des Inhaltes erkennbar sind.","correct":true},{"letter":"b","text":"Die Waffe/n darf/dürfen hierbei nicht im Fahrzeug verbleiben.","correct":false}],"is_open":false,"open_answer":null,"page":69},{"id":"4.15","question":"Wie sind erlaubnispflichtige Kurzwaffen aufzubewahren (bei dem Bestehen einer waffenrechtlichen Erlaubnis vor dem 06.07.2017 und Fortführung der Nutzung eines vorhandenen Behältnisses)?","options":[{"letter":"a","text":"In einer Stahlkassette der Sicherheitsstufe A nach VDMA 24992.","correct":false},{"letter":"b","text":"In einem Sicherheitsbehältnis der Sicherheitsstufe B der Norm VDMA 24992 oder einem Behältnis der Sicherheitsstufe DIN/EN 11431 Widerstandsgrad 0 oder I.","correct":true},{"letter":"c","text":"In einer Truhe mit Schwenkriegelschloss im verschlossenen Keller.","correct":false}],"is_open":false,"open_answer":null,"page":69},{"id":"4.16","question":"Wie sind erlaubnispflichtige Kurzwaffen aufzubewahren (Erteilung einer waffenrechtlichen Erlaubnis und dem damit verbunden Erwerb einer Schusswaffe nach dem 06.07.2017)?","options":[{"letter":"a","text":"In einem Sicherheitsbehältnis der Sicherheitsstufe B der Norm VDMA 24992.","correct":false},{"letter":"b","text":"In einem Sicherheitsbehältnis der Sicherheitsstufe DIN/EN 1143-1 Widerstandsgrad 0 oder I.","correct":true},{"letter":"c","text":"In einem Sicherheitsbehältnis der Sicherheitsstufe A der Norm VDMA 24992.","correct":false}],"is_open":false,"open_answer":null,"page":70},{"id":"4.17","question":"Welche Mindestanforderungen gelten für die dauerhafte Aufbewahrung von Waffen und Munition?","options":[{"letter":"a","text":"Munition ist im Stahlbehältnis mit Schwenkriegelschloss oder gleichwertigem Behältnis aufzubewahren.","correct":true},{"letter":"b","text":"Maximal 5 Kurzwaffen in einem Tresor mit Widerstandsgrad 0 (DIN/EN 11431)  bis 200 kg. Über 200 kg je 10 Kurzwaffen. Über 10 Kurzwaffen Widerstandsgrad I.","correct":true},{"letter":"c","text":"Bis zu 10 Langwaffen je A-Schrank. Über 10 Langwaffen im B-Schrank.","correct":false}],"is_open":false,"open_answer":null,"page":70},{"id":"4.18","question":"Wie dürfen acht erlaubnispflichtige Kurzwaffen untern anderem sicher vor unbefugtem Zugriff dauerhaft aufbewahrt werden?","options":[{"letter":"a","text":"In einem Tresor der Sicherheitsstufe B mit mehr als 200 Kilogramm Gewicht (VDMA 24992) (wenn der Tresor bereits vor dem 06.07.2017 rechtmäßig vom Betroffenen zur Waffenaufbewahrung genutzt wurde).","correct":true},{"letter":"b","text":"In einem Tresor mit Widerstandsgrad 0 (DIN/EN 1143-1), dessen Gewicht mindesten 200 kg beträgt.","correct":true},{"letter":"c","text":"In einem Tresor der Sicherheitsstufe A (VDMA 24992).","correct":false}],"is_open":false,"open_answer":null,"page":70},{"id":"4.19","question":"Welche und wie viele erlaubnispflichtigen Schusswaffen dürfen Sie in einem Schrank der Sicherheitsstufe A nach VDMA 24992 (bei dem Bestehen einer waffenrechtlichen Erlaubnis vor dem 06.07.2017 und Fortführung der Nutzung eines vorhandenen Behältnisses) dauerhaft aufbewahren?","options":[{"letter":"a","text":"5 Kurzwaffen","correct":false},{"letter":"b","text":"5 Langwaffen und 5 Kurzwaffen","correct":false},{"letter":"c","text":"10 Langwaffen","correct":true}],"is_open":false,"open_answer":null,"page":70},{"id":"4.20","question":"Dürfen Sie während des Urlaubes einem Vereinskameraden Ihre WBKpflichtige Schusswaffe zur sicheren Aufbewahrung überlassen?","options":[{"letter":"a","text":"Ja, wenn er selbst auch eine WBK besitzt und über ein entsprechendes Behältnis verfügt.","correct":true},{"letter":"b","text":"Nein, das ist nicht gestattet.","correct":false},{"letter":"c","text":"Dies ist unter Vereinsmitgliedern gestattet.","correct":false},{"letter":"d","text":"Ja, es ist ausreichend, dass er ein entsprechendes Behältnis besitzt.","correct":false}],"is_open":false,"open_answer":null,"page":71},{"id":"4.21","question":"Wem dürfen Sie während Ihres Urlaubs eine erlaubnispflichtige Waffe vorübergehend zur sicheren Aufbewahrung überlassen?","options":[{"letter":"a","text":"Waffenhändler","correct":true},{"letter":"b","text":"Dem Nachbarn, der die Waffe in seiner Werkbank im Hobbyraum lagert.","correct":false},{"letter":"c","text":"Einem Inhaber einer Waffenbesitzkarte","correct":true}],"is_open":false,"open_answer":null,"page":71},{"id":"4.22","question":"Wie sind erlaubnispflichtige Langwaffen aufzubewahren?","options":[{"letter":"a","text":"In einem Sicherheitsbehältnis der Sicherheitsstufe B der Norm VDMA 24992.","correct":false},{"letter":"b","text":"In einem Sicherheitsbehältnis der Sicherheitsstufe DIN/EN 1143-1 Widerstandsgrad 0 oder I.","correct":true},{"letter":"c","text":"In einem Sicherheitsbehältnis der Sicherheitsstufe A der Norm VDMA 24992.","correct":false}],"is_open":false,"open_answer":null,"page":71},{"id":"4.23","question":"Gelten die Aufbewahrungsvorschriften des Waffengesetzes auch für sogenannte Salutwaffen?","options":[{"letter":"a","text":"Ja, vollumfänglich","correct":false},{"letter":"b","text":"Nein, aber der Besitzer hat die erforderlichen Vorkehrungen zu treffen, um zu verhindern, dass diese abhanden kommen oder Dritte sie unbefugt an sich nehmen.","correct":true}],"is_open":false,"open_answer":null,"page":71},{"id":"5.01","question":"Was ist Notwehr? Notwehr ist diejenige                         , die                                   ist, um einen                                       Angriff von sich oder einem anderen abzuwenden.","options":[],"is_open":true,"open_answer":"Lösung: Notwehr ist diejenige Verteidigung, die erforderlich ist, um einen gegenwärtigen rechtswidrigen Angriff von sich oder einem anderen abzuwenden.","page":72},{"id":"5.02","question":"Was ist Notwehr?","options":[],"is_open":true,"open_answer":"Notwehr ist diejenige Verteidigung, die erforderlich ist, um einen gegenwärtigen rechtswidrigen Angriff von sich oder einem anderen abzuwenden.","page":72},{"id":"5.03","question":"Notwehr ist...","options":[{"letter":"a","text":"jede Abwehr eines gegenwärtigen und rechtswidrigen Angriffs von sich und anderen.","correct":false},{"letter":"b","text":"jede Verteidigung, die erforderlich ist, um einen gegenwärtigen rechtswidrigen Angriff von sich oder einem anderen abzuwenden.","correct":true},{"letter":"c","text":"jede Verteidigung, die erforderlich ist, um jeden Angriff von sich oder einem anderen abzuwenden.","correct":false}],"is_open":false,"open_answer":null,"page":72},{"id":"5.04","question":"Gegen wen findet im Falle der Notwehr die Verteidigungshandlung statt?","options":[{"letter":"a","text":"Angreifer","correct":true},{"letter":"b","text":"Zuschauer","correct":false},{"letter":"c","text":"Angegriffener","correct":false}],"is_open":false,"open_answer":null,"page":72},{"id":"5.05","question":"In Notwehr darf man handeln bei einem Angriff...","options":[{"letter":"a","text":"nur auf Leib und Leben.","correct":false},{"letter":"b","text":"auf jedes Individual-Rechtsgut.","correct":true},{"letter":"c","text":"nur gegen das Eigentum.","correct":false}],"is_open":false,"open_answer":null,"page":72},{"id":"5.06","question":"Welches sind Voraussetzungen der Notwehr?","options":[{"letter":"a","text":"Verteidigungslage","correct":true},{"letter":"b","text":"Verteidigungswille","correct":true},{"letter":"c","text":"Erforderlichkeit","correct":true}],"is_open":false,"open_answer":null,"page":72},{"id":"5.07","question":"Durch eine Notwehrhandlung entfällt die/der …?","options":[{"letter":"a","text":"Rechtswidrigkeit","correct":true},{"letter":"b","text":"Vorsatz","correct":false},{"letter":"c","text":"Schuld","correct":false}],"is_open":false,"open_answer":null,"page":73},{"id":"5.08","question":"Notwehr mit einer Schusswaffe ist nicht gerechtfertigt...","options":[{"letter":"a","text":"bei Beleidigung.","correct":true},{"letter":"b","text":"bei lebensgefährlichem tätlichem Angriff auf den Ehepartner.","correct":false}],"is_open":false,"open_answer":null,"page":73},{"id":"5.09","question":"Schusswaffengebrauch als Notwehr kann als letztes Mittel zulässig sein,","options":[{"letter":"a","text":"wenn dem Angriff ausgewichen werden kann.","correct":false},{"letter":"b","text":"wenn der Angriff mit einem Messer erfolgt.","correct":true},{"letter":"c","text":"wenn der Angreifer mit der Faust droht.","correct":false}],"is_open":false,"open_answer":null,"page":73},{"id":"5.10","question":"Ist ein Schusswaffengebrauch in Notwehr zulässig, wenn der Angegriffene dem Angriff ausweichen kann?","options":[{"letter":"a","text":"Nein, niemals","correct":false},{"letter":"b","text":"Ist der Einsatz eines milderen Mittels zur Abwehr des Angriffs möglich, ist der Schusswaffengebrauch nicht zulässig.","correct":true},{"letter":"c","text":"Grundsätzlich ist dem Angegriffenen ein Ausweichen nicht zumutbar, da dies seine Ehre verletzt.","correct":false}],"is_open":false,"open_answer":null,"page":73},{"id":"5.11","question":"Soll im Notwehrfall vor dem Gebrauch der Schusswaffe gewarnt werden?","options":[{"letter":"a","text":"Ja, das ist Voraussetzung für einen rechtmäßigen Schusswaffengebrauch.","correct":false},{"letter":"b","text":"Ja, soweit die Umstände es erlauben.","correct":true},{"letter":"c","text":"Nein, das ist nicht erforderlich.","correct":false}],"is_open":false,"open_answer":null,"page":73},{"id":"5.12","question":"Darf in einer Notwehrsituation immer von der Schusswaffe Gebrauch gemacht werden?","options":[{"letter":"a","text":"Nur wenn kein milderes Mittel zur Verfügung steht, um den Angriff abzuwehren.","correct":true},{"letter":"b","text":"Der Schusswaffengebrauch ist stets als allerletzter Ausweg aus einer bedrohlichen Situation zu betrachten.","correct":true},{"letter":"c","text":"Ja, immer","correct":false}],"is_open":false,"open_answer":null,"page":73},{"id":"5.13","question":"Sollte im Notwehrfall der Angreifer vor dem Gebrauch der Schusswaffe gewarnt werden?","options":[{"letter":"a","text":"Nein","correct":false},{"letter":"b","text":"Wenn möglich durch Zuruf und/oder Warnschuss.","correct":true},{"letter":"c","text":"Das Zeigen der Waffe reicht aus, um den Angriff zu beenden.","correct":false}],"is_open":false,"open_answer":null,"page":74},{"id":"5.14","question":"Soll im Notwehrfall der Angreifer vor dem Gebrauch der Schusswaffe gewarnt werden?","options":[],"is_open":true,"open_answer":"Ja, soweit es die Umstände erlauben. (Es sollte vor dem Schusswaffengebrauch durch Zuruf, Warnschuss oder auf andere Weise gewarnt werden.)","page":74},{"id":"5.15","question":"Dürfen Sie in jeder Notwehrsituation von der Schusswaffe Gebrauch machen?","options":[{"letter":"a","text":"Ja, immer","correct":false},{"letter":"b","text":"Nein, allenfalls bei einem Angriff auf Leben, Leib oder erhebliche Rechtsgüter des Einzelnen.","correct":true},{"letter":"c","text":"Ja, auch wenn der Angriff durch mildere Mittel abgewehrt werden kann.","correct":false}],"is_open":false,"open_answer":null,"page":74},{"id":"5.16","question":"Wie lange besteht eine Notwehrsituation fort?","options":[{"letter":"a","text":"Bis der Angreifer weggelaufen ist.","correct":false},{"letter":"b","text":"Solange der Angriff andauert.","correct":true},{"letter":"c","text":"Bis ich den Angreifer der Polizei übergeben habe.","correct":false}],"is_open":false,"open_answer":null,"page":74},{"id":"5.17","question":"Wie lange besteht eine Notwehrsituation fort?","options":[{"letter":"a","text":"Bis der Gegner bewusstlos bzw. geflüchtet ist.","correct":false},{"letter":"b","text":"Solange der Angriff andauert.","correct":true},{"letter":"c","text":"Bis ich gefahrlos dem Angriff ausweichen kann, wenn ich dadurch keine wesentlichen Rechtsgüter aufgeben muss.","correct":true},{"letter":"d","text":"Auf jeden Fall bis die Polizei eintrifft.","correct":false}],"is_open":false,"open_answer":null,"page":74},{"id":"5.18","question":"Was versteht man unter „Putativnotwehr“?","options":[{"letter":"a","text":"Überschreitung der Notwehr.","correct":false},{"letter":"b","text":"Ein gegenwärtiger, rechtswidriger Angriff wird von einem anderen Angegriffenen abgewehrt.","correct":false},{"letter":"c","text":"Irrtümliche Annahme einer Notwehrsituation.","correct":true}],"is_open":false,"open_answer":null,"page":75},{"id":"5.19","question":"Worauf müssen Sie bei Notwehr vorrangig achten?","options":[{"letter":"a","text":"Die Unversehrtheit meines Eigentums.","correct":false},{"letter":"b","text":"Die Verteidigung mit allen Mitteln.","correct":false},{"letter":"c","text":"Eine angemessene Verteidigung. (Verhältnismäßigkeit)","correct":true}],"is_open":false,"open_answer":null,"page":75},{"id":"5.20","question":"Was bedeutet Notwehrüberschreitung?","options":[],"is_open":true,"open_answer":"Notwehrüberschreitung oder Notwehrexzess liegt vor, wenn der Verteidiger das erforderliche Maß der Abwehr überschreitet.","page":75},{"id":"5.21","question":"Erklären Sie den Begriff „Notwehrexzess“ und seine strafrechtliche Bedeutung!","options":[],"is_open":true,"open_answer":"Beim Notwehrexzess wird das zulässige Maß der Abwehr überschritten. Das Handeln wird nur dann entschuldigt, wenn in Furcht, Verwirrung oder Schrecken über die Grenzen der Notwehr hinausgegangen worden ist.","page":75},{"id":"5.22","question":"Was ist Notstand?","options":[],"is_open":true,"open_answer":"Bei einem Notstand besteht eine gegenwärtige Gefahr für ein Rechtsgut, die nur durch Verletzung eines anderen Rechtsgutes abgewendet werden kann, wobei eine Abwägung der widerstreitenden Interessen stattfinden muss, in deren Ergebnis das als minderwertiger erkannte Rechtsgut geopfert wird.","page":75},{"id":"5.23","question":"Was bedeutet rechtfertigender Notstand?","options":[],"is_open":true,"open_answer":"In rechtfertigendem Notstand handelt, wer in einer gegenwärtigen, nicht anders abwendbaren Gefahr für Leben, Leib, Freiheit, Ehre, Eigentum oder ein anderes Rechtsgut eine Tat begeht, um die Gefahr von sich oder einem Anderen abzuwenden, wenn bei Abwägung der widerstreitenden Interessen das geschützte Interesse das beeinträchtigte wesentlich überwiegt.","page":75},{"id":"5.24","question":"Was bedeutet entschuldigender Notstand?","options":[],"is_open":true,"open_answer":"Wer in einer gegenwärtigen, nicht anders abwendbaren Gefahr für Leben, Leib oder Freiheit eine rechtswidrige Tat begeht, um die Gefahr von sich, einem Angehörigen oder einer anderen ihm nahestehenden Person abzuwenden, handelt ohne Schuld.","page":75},{"id":"5.25","question":"Welche Situation beurteilen Sie als Notstandslage?","options":[{"letter":"a","text":"Sie finden eine geladene Jagdwaffe im Wald.","correct":false},{"letter":"b","text":"Sie werden durch ein herrenloses Tier angegriffen.","correct":true},{"letter":"c","text":"Sie werden durch eine Person angegriffen.","correct":false}],"is_open":false,"open_answer":null,"page":76},{"id":"5.26","question":"Nennen Sie vier wesentliche Voraussetzungen für den rechtfertigenden Notstand!","options":[],"is_open":true,"open_answer":"1. Gegenwärtige Gefahr liegt vor. 2. Rechtsgüter sind bedroht (Leben, Leib, Freiheit, Ehre, Eigentum). 3. Das zu schützende Rechtsgut ist wesentlich höherwertiger als das beeinträchtigte. 4. Die Abwehrhandlung muss angemessen sein.","page":76},{"id":"5.27","question":"Welches sind die Voraussetzungen des rechtfertigenden Notstandes?","options":[{"letter":"a","text":"gegenwärtige, nicht mit geringerem Eingriff abwehrbare Gefahr für ein Rechtsgut; wesentliches Überwiegen des geschützten Interesses","correct":true},{"letter":"b","text":"Absicht, die Gefahr nicht von sich oder einem anderen abzuwenden","correct":false},{"letter":"c","text":"gegenwärtiger rechtswidriger Angriff","correct":false}],"is_open":false,"open_answer":null,"page":76},{"id":"5.28","question":"Was versteht man unter Nothilfe?","options":[],"is_open":true,"open_answer":"Die Abwehr eines Angriffes gegen einen Anderen; sie ist ein Unterfall der Notwehr; die Voraussetzungen sind gleich.","page":76},{"id":"5.29","question":"Nothilfe ist diejenige Verteidigung, die erforderlich ist, um einen gegenwärtigen rechtswidrigen Angriff...","options":[{"letter":"a","text":"von sich selbst abzuwenden.","correct":false},{"letter":"b","text":"von einem anderen abzuwenden.","correct":true},{"letter":"c","text":"vom eigenen Auto abzuwenden.","correct":false}],"is_open":false,"open_answer":null,"page":76},{"id":"5.30","question":"Was ist ein gegenwärtiger Angriff?","options":[],"is_open":true,"open_answer":"Jede unmittelbar bevorstehende, gerade stattfindende oder fortdauernde Verletzung eines Rechtsgutes.","page":76},{"id":"5.31","question":"Welche Verteidigungshandlung ist erforderlich, um einen Angriff abzuwenden?","options":[],"is_open":true,"open_answer":"Die Erforderlichkeit bestimmt sich nach Stärke und Gefährlichkeit des Angriffs; grundsätzlich ist das mildeste Mittel zur Abwehr zu wählen, das erfolgversprechend ist.","page":76},{"id":"5.32","question":"Wann ist ein Angriff gegenwärtig?","options":[{"letter":"a","text":"Wenn er abgeschlossen ist.","correct":false},{"letter":"b","text":"Wenn er unmittelbar bevorsteht.","correct":true},{"letter":"c","text":"Solange er andauert.","correct":true}],"is_open":false,"open_answer":null,"page":77},{"id":"5.33","question":"Wann ist ein Angriff gegenwärtig?","options":[{"letter":"a","text":"Wenn zu befürchten ist, dass durch eine Drohung des Angreifers zukünftig eine Gefahr für Leib und Leben eintreten könnte.","correct":false},{"letter":"b","text":"Wenn ein Angriff unmittelbar bevorsteht oder noch nicht beendet ist.","correct":true},{"letter":"c","text":"Wenn der Angreifer in die Flucht geschlagen ist, aber mit einem späteren Angriff droht.","correct":false}],"is_open":false,"open_answer":null,"page":77},{"id":"5.34","question":"Wann ist die Gefahr gegenwärtig?","options":[{"letter":"a","text":"Es kann jeden Augenblick ein Schaden eintreten.","correct":true},{"letter":"b","text":"Es wird vielleicht ein Schaden eintreten.","correct":false},{"letter":"c","text":"Es ist ein Schaden eingetreten.","correct":false}],"is_open":false,"open_answer":null,"page":77},{"id":"5.35","question":"Was bedeutet „rechtswidrig“?","options":[],"is_open":true,"open_answer":"Ein Angriff ist rechtswidrig, wenn er gegen eine Rechtsnorm verstößt und ein Rechtfertigungsgrund nicht gegeben ist.","page":77},{"id":"5.36","question":"Was ist Ihre Pflicht nach einem abgewehrten Angriff?","options":[{"letter":"a","text":"Ich habe keinerlei Pflichten gegenüber dem Angreifer.","correct":false},{"letter":"b","text":"Ich bin zum Schadensersatz verpflichtet.","correct":false},{"letter":"c","text":"Wenn die Notwendigkeit erkennbar und die Situation zumutbar ist, habe ich Hilfe zu leisten.","correct":true}],"is_open":false,"open_answer":null,"page":77},{"id":"5.37","question":"Regelungen über Notwehr und Notstand finden Sie im...","options":[{"letter":"a","text":"Grundgesetz","correct":false},{"letter":"b","text":"Waffengesetz","correct":false},{"letter":"c","text":"Strafgesetzbuch / BGB","correct":true}],"is_open":false,"open_answer":null,"page":77},{"id":"5.38","question":"Was sind u.a. Rechtfertigungsgründe nach dem Strafgesetzbuch?","options":[{"letter":"a","text":"Notwehr","correct":true},{"letter":"b","text":"Nothilfe","correct":true},{"letter":"c","text":"Notstand","correct":true}],"is_open":false,"open_answer":null,"page":78},{"id":"5.39","question":"Welches ist das höchste Rechtsgut?","options":[{"letter":"a","text":"Freiheit","correct":false},{"letter":"b","text":"Eigentum","correct":false},{"letter":"c","text":"Leib / Leben","correct":true}],"is_open":false,"open_answer":null,"page":78},{"id":"5.40","question":"Bei der Abwehr eines nicht auf Kommando angreifenden Hundes handeln Sie...","options":[{"letter":"a","text":"in Notwehr.","correct":false},{"letter":"b","text":"in Nothilfe.","correct":false},{"letter":"c","text":"in Notstand.","correct":true}],"is_open":false,"open_answer":null,"page":78},{"id":"5.41","question":"Dürfen Sie auch bei der Gefahr des Verlustes geringwertiger Gegenstände von der Schusswaffe Gebrauch machen?","options":[],"is_open":true,"open_answer":"Nein (Bei der Gefahr des Verlustes geringwertiger Gegenstände ist Schusswaffengebrauch keine durch Notwehr gebotene Verteidigungshandlung.)","page":78},{"id":"5.42","question":"Sie beobachten wie jemand mit einer Schusswaffe bedroht wird. Sie greifen mit Ihrer Schusswaffe ein. Dabei wird der Angreifer verletzt. Es stellt sich hinterher heraus, dass kein rechtswidriger Angriff vorlag, weil es sich um Filmaufnahmen handelte. Sie handelten in…","options":[{"letter":"a","text":"Putativnotwehr (scheinbare Notwehr).","correct":true},{"letter":"b","text":"Notstand.","correct":false},{"letter":"c","text":"Notwehrexzess.","correct":false}],"is_open":false,"open_answer":null,"page":78},{"id":"5.43","question":"Eine Person bricht Ihren PKW auf. Sie sehen das vom Fenster Ihres Hauses aus und schießen. Die Person wird dabei verletzt. Wie ist die Situation zu beurteilen?","options":[{"letter":"a","text":"Der Einsatz der Schusswaffe war durch Notwehr gerechtfertigt.","correct":false},{"letter":"b","text":"Die Notwehr wurde überschritten (Notwehrexzess).","correct":true},{"letter":"c","text":"Der Einsatz der Schusswaffe war durch Nothilfe gerechtfertigt.","correct":false}],"is_open":false,"open_answer":null,"page":78}];

let state = { chapter: 'all', type: 'all', order: ALL_QUESTIONS.map((_,i)=>i), answers: {} };

function getFiltered() {
  return state.order.map(i => ALL_QUESTIONS[i]).filter(q => {
    const ch = q.id.split('.')[0];
    if (state.chapter !== 'all' && ch !== state.chapter) return false;
    if (state.type === 'mc' && q.is_open) return false;
    if (state.type === 'open' && !q.is_open) return false;
    return true;
  });
}

function setFilter(kind, val, el) {
  state[kind] = val;
  el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function shuffleQuestions() {
  for (let i = state.order.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
  }
  render();
}

function resetAll() {
  state.answers = {};
  render();
}

function toggleOption(qId, letter) {
  const s = state.answers[qId];
  if (!s || s.submitted) return;
  if (s.selected.has(letter)) s.selected.delete(letter);
  else s.selected.add(letter);
  updateCard(qId);
}

function submit(qId) {
  const q = ALL_QUESTIONS.find(x => x.id === qId);
  const s = state.answers[qId];
  if (!s || s.submitted || !q) return;
  s.submitted = true;
  const correctSet = new Set(q.options.filter(o => o.correct).map(o => o.letter));
  s.correct = correctSet.size === s.selected.size && [...correctSet].every(l => s.selected.has(l));
  updateCard(qId);
  updateStats();
  updateProgress();
}

function showModel(qId) {
  const el = document.getElementById('model-'+qId);
  const btn = document.getElementById('btnm-'+qId);
  if (!el) return;
  const vis = el.classList.toggle('visible');
  btn.textContent = vis ? '▲ Musterantwort verbergen' : '▼ Musterantwort anzeigen';
}

function updateCard(qId) {
  const q = ALL_QUESTIONS.find(x => x.id === qId);
  const s = state.answers[qId];
  if (!q || !s) return;
  const card = document.getElementById('card-'+qId);
  if (!card) return;

  if (s.submitted) {
    card.classList.remove('answered-correct','answered-wrong');
    card.classList.add(s.correct ? 'answered-correct' : 'answered-wrong');
  }

  q.options.forEach(opt => {
    const item = document.getElementById('opt-'+qId+'-'+opt.letter);
    if (!item) return;
    item.classList.remove('selected','reveal-correct','reveal-wrong','disabled');
    const svg = item.querySelector('.checkbox svg');
    if (s.submitted) {
      item.classList.add('disabled');
      if (opt.correct) {
        item.classList.add('reveal-correct');
        svg.innerHTML = '<polyline points="3,9 7,13 13,5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>';
      } else if (s.selected.has(opt.letter)) {
        item.classList.add('reveal-wrong');
        svg.innerHTML = '<line x1="4" y1="4" x2="12" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>';
      }
    } else {
      if (s.selected.has(opt.letter)) {
        item.classList.add('selected');
        svg.innerHTML = '<polyline points="3,9 7,13 13,5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>';
      } else {
        svg.innerHTML = '';
      }
    }
  });

  const btn = document.getElementById('submit-'+qId);
  if (btn) {
    btn.disabled = s.submitted || s.selected.size === 0;
    if (s.submitted) btn.textContent = s.correct ? '✓ Richtig!' : '✗ Falsch';
  }

  const fb = document.getElementById('fb-'+qId);
  if (fb && s.submitted) {
    fb.classList.add('visible');
    fb.classList.remove('correct','wrong');
    if (s.correct) {
      fb.classList.add('correct');
      fb.textContent = '✓ Korrekt – alle richtigen Antworten ausgewählt!';
    } else {
      fb.classList.add('wrong');
      const cl = q.options.filter(o=>o.correct).map(o=>o.letter.toUpperCase()).join(', ');
      fb.textContent = '✗ Nicht korrekt. Richtige Antwort(en): ' + cl;
    }
  }
}

function updateStats() {
  const a = Object.values(state.answers).filter(s=>s.submitted);
  document.getElementById('stat-correct').textContent = a.filter(s=>s.correct).length;
  document.getElementById('stat-wrong').textContent = a.filter(s=>!s.correct).length;
}

function updateProgress() {
  const f = getFiltered();
  const answered = f.filter(q => state.answers[q.id] && state.answers[q.id].submitted).length;
  const pct = f.length ? Math.round(answered/f.length*100) : 0;
  document.getElementById('progress-text').textContent = answered + ' von ' + f.length + ' beantwortet';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('stat-shown').textContent = f.length;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildCard(q) {
  const isOpen = q.is_open;
  const badge = isOpen
    ? '<span class="q-type-badge badge-open">Freitext</span>'
    : '<span class="q-type-badge badge-mc">Multiple Choice</span>';

  let body;
  if (isOpen) {
    const hasAns = q.open_answer && !q.open_answer.includes('Keine Antwort im Dokument');
    body = hasAns
      ? `<div class="open-hint">📝 Diese Frage erfordert eine Freitextantwort.
          <button class="show-answer-btn" id="btnm-${q.id}" onclick="showModel('${q.id}')">▼ Musterantwort anzeigen</button>
          <div class="model-answer" id="model-${q.id}">${esc(q.open_answer)}</div>
         </div>`
      : `<div class="open-hint">ℹ️ Keine Musterantwort im Dokument verfügbar – bitte im offiziellen Fragenkatalog nachschlagen.</div>`;
  } else {
    const multiCorrect = q.options.filter(o=>o.correct).length > 1;
    const hint = multiCorrect ? '<div class="multi-hint">⚠ Mehrere Antworten können richtig sein</div>' : '';
    const opts = q.options.map(o => `
      <div class="option-item" id="opt-${q.id}-${o.letter}" onclick="toggleOption('${q.id}','${o.letter}')">
        <div class="checkbox"><svg viewBox="0 0 16 16" width="10" height="10"></svg></div>
        <span class="option-letter">${o.letter.toUpperCase()})</span>
        <span class="option-text">${esc(o.text)}</span>
      </div>`).join('');
    body = `
      ${hint}
      <div class="options-list">${opts}</div>
      <div class="q-footer">
        <button class="submit-btn" id="submit-${q.id}" onclick="submit('${q.id}')" disabled>Antwort prüfen</button>
        <div class="feedback" id="fb-${q.id}"></div>
      </div>`;
  }

  return `<div class="question-card" id="card-${q.id}">
    <div class="q-meta"><span class="q-id">${esc(q.id)}</span>${badge}</div>
    <div class="q-text">${esc(q.question)}</div>
    ${body}
  </div>`;
}

function render() {
  const f = getFiltered();
  const container = document.getElementById('questions-container');
  f.forEach(q => { if (!state.answers[q.id]) state.answers[q.id] = { selected: new Set(), submitted: false, correct: false }; });
  container.innerHTML = f.length ? f.map(buildCard).join('') : '<div class="empty">🔍 Keine Fragen für diesen Filter.</div>';
  f.forEach(q => updateCard(q.id));
  updateProgress();
  updateStats();
}

render();
</script></body></html>
