<!DOCTYPE html>

<title>Sachkundeprüfung – Lernapp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #23273a;
    --border: #2e3347;
    --text: #e8eaf0;
    --text2: #8b91a8;
    --accent: #4f8ef7;
    --accent2: #7c5fe6;
    --green: #3ecf8e;
    --red: #f76f6f;
    --yellow: #f7c948;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
  .logo { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 15px; color: var(--accent); letter-spacing: 0.02em; }
  .logo span { color: var(--text2); }
  .header-stats { margin-left: auto; display: flex; gap: 20px; font-size: 13px; color: var(--text2); }
  .stat-correct { color: var(--green); } .stat-wrong { color: var(--red); }
  .app { max-width: 820px; margin: 0 auto; padding: 24px 16px 80px; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .filter-label { font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .chip { padding: 6px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .chip-type.active { background: var(--accent2); border-color: var(--accent2); }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .progress-bar-wrap { background: var(--surface); border-radius: 4px; height: 6px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s; }
  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; }
  .question-card.answered-correct { border-color: var(--green); }
  .question-card.answered-wrong { border-color: var(--red); }
  .q-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .q-id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); background: rgba(79,142,247,0.12); padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .q-type-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .badge-mc { background: rgba(124,95,230,0.15); color: var(--accent2); }
  .badge-open { background: rgba(247,201,72,0.15); color: var(--yellow); }
  .q-text { font-size: 15.5px; font-weight: 500; color: var(--text); margin-bottom: 16px; line-height: 1.55; }
  .options-list { display: flex; flex-direction: column; gap: 8px; }
  .option-item { display: flex; align-items: flex-start; gap: 11px; padding: 11px 13px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all 0.15s; user-select: none; }
  .option-item:hover:not(.disabled) { border-color: var(--accent); background: rgba(79,142,247,0.06); }
  .option-item.selected { border-color: var(--accent); background: rgba(79,142,247,0.1); }
  .option-item.disabled { cursor: default; }
  .option-item.reveal-correct { border-color: var(--green) !important; background: rgba(62,207,142,0.09) !important; }
  .option-item.reveal-wrong { border-color: var(--red) !important; background: rgba(247,111,111,0.09) !important; }
  .checkbox { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all 0.15s; }
  .option-item.selected .checkbox { border-color: var(--accent); background: var(--accent); }
  .option-item.reveal-correct .checkbox { border-color: var(--green); background: var(--green); }
  .option-item.reveal-wrong .checkbox { border-color: var(--red); background: var(--red); }
  .checkbox svg { display: none; }
  .option-item.selected .checkbox svg, .option-item.reveal-correct .checkbox svg, .option-item.reveal-wrong .checkbox svg { display: block; }
  .option-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text2); font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .option-text { font-size: 14px; line-height: 1.5; }
  .open-hint { background: rgba(247,201,72,0.07); border: 1px solid rgba(247,201,72,0.2); border-radius: 8px; padding: 14px 16px; font-size: 13.5px; color: var(--text2); }
  .model-answer { margin-top: 10px; padding: 12px 14px; background: var(--surface2); border-radius: 6px; font-size: 14px; color: var(--text); line-height: 1.6; display: none; white-space: pre-wrap; }
  .model-answer.visible { display: block; }
  .show-answer-btn { margin-top: 8px; display: block; padding: 5px 12px; border-radius: 6px; background: none; border: 1px solid rgba(247,201,72,0.35); color: var(--yellow); font-size: 12px; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .show-answer-btn:hover { background: rgba(247,201,72,0.08); }
  .q-footer { margin-top: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .submit-btn { padding: 8px 18px; border-radius: 7px; background: var(--accent); color: #fff; border: none; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:disabled { opacity: 0.38; cursor: default; }
  .reset-btn { padding: 8px 14px; border-radius: 7px; background: none; border: 1px solid var(--border); color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .reset-btn:hover { border-color: var(--text2); color: var(--text); }
  .feedback { display: none; align-items: center; font-size: 13.5px; font-weight: 500; padding: 7px 12px; border-radius: 7px; }
  .feedback.visible { display: flex; }
  .feedback.correct { background: rgba(62,207,142,0.11); color: var(--green); }
  .feedback.wrong { background: rgba(247,111,111,0.11); color: var(--red); }
  .empty { text-align: center; padding: 80px 0; color: var(--text2); font-size: 15px; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .multi-hint { font-size: 11px; color: var(--text2); margin-bottom: 10px; font-style: italic; }
</style>

<script>
const ALL_QUESTIONS = [{"id":"1.01","question":"Was regelt das Waffengesetz?","options":[],"is_open":true,"open_answer":"Das Waffengesetz regelt den Umgang mit Waffen oder Munition unter Berücksichtigung der Belange der öffentlichen Sicherheit und Ordnung.","page":5},{"id":"1.02","question":"Umgang mit einer Schusswaffe hat…","options":[{"letter":"a","text":"wer damit schießt.","correct":true},{"letter":"b","text":"wer die Waffe verbringt oder mitnimmt.","correct":true},{"letter":"c","text":"wer die Waffe unbrauchbar macht.","correct":true}],"is_open":false,"open_answer":null,"page":5},{"id":"1.03","question":"Wie werden Schusswaffen im Sinne des Waffengesetzes definiert?","options":[],"is_open":true,"open_answer":"Schusswaffen sind Gegenstände, die zum Angriff oder zur Verteidigung, zur Signalgebung, zur Jagd, zur Distanzinjektion, zur Markierung, zum Sport oder zum Spiel bestimmt sind und bei denen Geschosse durch einen Lauf getrieben werden (Anlage 1 Abschnitt 1 Unterabschnitt 1 Nr. 1.1 WaffG).","page":5},{"id":"1.04","question":"Welche der hier genannten Gegenstände sind Schusswaffen im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Armbrust","correct":false},{"letter":"b","text":"Druckluftgewehr mit Zulassungszeichen „F im Fünfeck“","correct":true},{"letter":"c","text":"Doppelflinte","correct":true}],"is_open":false,"open_answer":null,"page":5},{"id":"1.05","question":"Welche der hier genannten Gegenstände sind Schusswaffen, bzw. ihnen gleichgestellte Gegenstände im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Soft-Air-Waffen mit einer Geschossenergie über 0,5 Joule","correct":true},{"letter":"b","text":"Waffen mit einer Mündungsenergie von weniger als 7,5 Joule, bei denen die Geschosse durch Federdruck durch einen Lauf getrieben werden","correct":true},{"letter":"c","text":"Präzisionsschleudern","correct":false}],"is_open":false,"open_answer":null,"page":5},{"id":"1.06","question":"Welche der aufgeführten Waffen ist eine halbautomatische Schusswaffe im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Single-Action-Revolver","correct":false},{"letter":"b","text":"Selbstladepistole","correct":true},{"letter":"c","text":"Doppelflinte","correct":false},{"letter":"d","text":"Double-Action Revolver","correct":false}],"is_open":false,"open_answer":null,"page":5},{"id":"1.07","question":"Ein Double-Action-Revolver ist im Sinne des Waffenrechts...","options":[{"letter":"a","text":"eine vollautomatische Waffe.","correct":false},{"letter":"b","text":"keine halbautomatische Waffe.","correct":true},{"letter":"c","text":"eine halbautomatische Waffe.","correct":false}],"is_open":false,"open_answer":null,"page":6},{"id":"1.08","question":"Wie ist ein Revolver im „Kleinstkaliber“ 4 mm M20 waffenrechtlich einzuordnen?","options":[{"letter":"a","text":"WBK-pflichtige Schusswaffe","correct":true},{"letter":"b","text":"Für Personen ab 18 Jahren frei erwerbbar","correct":false},{"letter":"c","text":"Kann mit einem kleinen Waffenschein erworben werden","correct":false}],"is_open":false,"open_answer":null,"page":6},{"id":"1.09","question":"Welches sind die wesentlichen Teile einer halbautomatischen Pistole im waffenrechtlichen Sinne?","options":[],"is_open":true,"open_answer":"1. Lauf (Patronenlager) 2. Verschluss 3. Griffstück","page":6},{"id":"1.10","question":"Was ist die Schließfeder der großkalibrigen Pistole waffenrechtlich gesehen?","options":[{"letter":"a","text":"Ein Zubehörteil der Schusswaffe ohne waffenrechtliche Bedeutung.","correct":true},{"letter":"b","text":"Ein wesentlicher, erlaubnispflichtiger Teil der Schusswaffe.","correct":false},{"letter":"c","text":"Ein wesentlicher, beschusspflichtiger Teil der Schusswaffe.","correct":false}],"is_open":false,"open_answer":null,"page":6},{"id":"1.11","question":"Erläutern Sie den Begriff „Waffe“ im Sinne des WaffG!","options":[{"letter":"a","text":"Schusswaffen oder ihnen gleichgestellte Gegenstände.","correct":true},{"letter":"b","text":"Tragbare Gegenstände, die ihrem Wesen nach dazu bestimmt sind, die Angriffsoder Abwehrfähigkeit von Menschen zu beseitigen oder herabzusetzen, insbesondere Hiebund Stoßwaffen.","correct":true},{"letter":"c","text":"Tragbare Gegenstände, die ohne dafür bestimmt zu sein, insbesondere wegen ihrer Beschaffenheit, Handhabung oder Wirkungsweise geeignet sind die Angriffsoder Abwehrfähigkeit von Menschen zu beseitigen oder herabzusetzen und die im Waffengesetz genannt sind.","correct":true}],"is_open":false,"open_answer":null,"page":6},{"id":"1.12","question":"Wie unterscheidet das Waffengesetz Langwaffen und Kurzwaffen?","options":[{"letter":"a","text":"Langwaffen sind Schusswaffen, deren Lauf und Verschluss in geschlossener Stellung insgesamt länger als 30 cm sind und deren kürzeste bestimmungsgemäß verwendbare Gesamtlänge 60 cm überschreitet.","correct":true},{"letter":"b","text":"Schusswaffen, die eine Gesamtmindestlänge von 60 cm unterschreiten oder bei denen die Lauflänge kleiner als 30 cm ist, werden als Kurzwaffe bezeichnet.","correct":true},{"letter":"c","text":"Kurzwaffen haben maximal eine Länge von 20 cm.","correct":false}],"is_open":false,"open_answer":null,"page":7},{"id":"1.13","question":"Welcher der nebenstehend aufgeführten Gegenstände ist eine verbotene Waffe/ verbotener Gegenstand? (Hinweis: Vollständige Aufzählung s. Anlage 2 Abschnitt 1 Waffengesetz)","options":[{"letter":"a","text":"Blasrohr, Harpune, Armbrust","correct":false},{"letter":"b","text":"halbautomatisches Gewehr / halbautomatische Pistole","correct":false},{"letter":"c","text":"Schlagring, Stockdegen, Würgeholz (Nun-Chaku)","correct":true},{"letter":"d","text":"Wurfsterne, bestimmte Hartkernmunition, bestimmte Leuchtspurmunition","correct":true}],"is_open":false,"open_answer":null,"page":7},{"id":"1.14","question":"Welcher der nebenstehend aufgeführten Gegenstände ist eine verbotene Waffe?","options":[{"letter":"a","text":"Samuraischwert","correct":false},{"letter":"b","text":"feststehendes Messer mit einer Klinge von mehr als 8,5 cm","correct":false},{"letter":"c","text":"Vorderschaftrepetierflinte mit einer Lauflänge unter 45 cm","correct":true}],"is_open":false,"open_answer":null,"page":7},{"id":"1.15","question":"Bei welchen der aufgeführten Beispiele handelt es sich um „verbotene Waffen“?","options":[{"letter":"a","text":"Schusswaffen mit Schalldämpfer","correct":false},{"letter":"b","text":"Schusswaffen, die Reihenfeuer (Dauerfeuer) schießen.","correct":true},{"letter":"c","text":"Für Schusswaffen bestimmte Vorrichtungen, die das Ziel beleuchten.","correct":true},{"letter":"d","text":"Vorderschaftrepetierflinten deren Gesamtlänge in der kürzesten Verwendungsform weniger als 95 cm beträgt.","correct":true}],"is_open":false,"open_answer":null,"page":7},{"id":"1.16","question":"Welche der nachfolgend genannten Gegenstände sind gemäß Waffengesetz verboten?","options":[{"letter":"a","text":"Schalldämpfer","correct":false},{"letter":"b","text":"Distanz-Elektroimpulsgeräte","correct":true},{"letter":"c","text":"für Schusswaffen bestimmte Zielscheinwerfer","correct":true},{"letter":"d","text":"Kleinkaliberpatronen mit Leuchtspurgeschossen","correct":true},{"letter":"e","text":"Teleskopschlagstöcke","correct":false},{"letter":"f","text":"Büchsenpatronen mit Treibspiegelgeschossen","correct":true}],"is_open":false,"open_answer":null,"page":8},{"id":"1.17","question":"Welche Gegenstände zählen zu den verbotenen Waffen?","options":[{"letter":"a","text":"Feuerwaffen mit Dauerfeuereinrichtung","correct":true},{"letter":"b","text":"Spielzeugwaffen","correct":false},{"letter":"c","text":"Schusswaffen mit Schalldämpfer","correct":false}],"is_open":false,"open_answer":null,"page":8},{"id":"1.18","question":"Erlaubnispflichtig, jedoch keine verbotene Waffe ist...","options":[{"letter":"a","text":"ein Fallmesser.","correct":false},{"letter":"b","text":"eine vollautomatische Pistole.","correct":false},{"letter":"c","text":"eine zivile halbautomatische Schusswaffe, die wie eine vollautomatische Kriegswaffe aussieht.","correct":true}],"is_open":false,"open_answer":null,"page":8},{"id":"1.19","question":"Welches sind wesentliche Teile von Schusswaffen?","options":[{"letter":"a","text":"der Lauf","correct":true},{"letter":"b","text":"das Magazin","correct":false},{"letter":"c","text":"der Verschluss","correct":true},{"letter":"d","text":"das Griffstück mit Auslösemechanismus bei Kurzwaffen","correct":true},{"letter":"e","text":"die Trommel eines Revolvers","correct":true},{"letter":"f","text":"das Gehäuse bei Langwaffen","correct":true},{"letter":"g","text":"das Zielfernrohr","correct":false}],"is_open":false,"open_answer":null,"page":8},{"id":"1.20","question":"Was ist ein Schalldämpfer waffenrechtlich gesehen?","options":[{"letter":"a","text":"Der Schalldämpfer ist ein verbotener Gegenstand.","correct":false},{"letter":"b","text":"Der Schalldämpfer ist immer erlaubnisfreies Zubehör.","correct":false},{"letter":"c","text":"Der Schalldämpfer für eine erlaubnispflichtige Schusswaffe steht waffenrechtlich der Schusswaffe gleich für die sie bestimmt ist.","correct":true}],"is_open":false,"open_answer":null,"page":9},{"id":"1.21","question":"Mit welchen Gegenständen (in Verbindung mit einer Schusswaffe) ist der Umgang verboten?","options":[{"letter":"a","text":"Zielscheinwerfer","correct":true},{"letter":"b","text":"Leuchtpunktvisiere für Kurzwaffen","correct":false},{"letter":"c","text":"Nachtzielgeräte","correct":true}],"is_open":false,"open_answer":null,"page":9},{"id":"1.22","question":"Mit welcher Munition der Bezeichnung „9 mm Luger“ ist der Umgang verboten?","options":[{"letter":"a","text":"Hohlspitzpatronen","correct":false},{"letter":"b","text":"Kleinschrotpatronen","correct":false},{"letter":"c","text":"Leuchtspurpatronen","correct":true}],"is_open":false,"open_answer":null,"page":9},{"id":"1.23","question":"Mit welcher Munition ist der Umgang verboten?","options":[{"letter":"a","text":"Kleinschrotmunition für Kartuschenlager bis 12,5 mm (sog. Grenaille-Patronen)","correct":true},{"letter":"b","text":"Patronenmunition mit Vollmantelgeschossen, bei denen die Geschossspitze entfernt wurde, so dass der Bleikern freiliegt","correct":false},{"letter":"c","text":"Patronenmunition mit Treibspiegelgeschossen für Waffen mit gezogenen Läufen","correct":true}],"is_open":false,"open_answer":null,"page":9},{"id":"1.24","question":"Ist eine Patrone mit Wadcutter-Geschoss verbotene Munition?","options":[{"letter":"a","text":"Ja, denn es handelt sich um ein Dum-Dum-Geschoss.","correct":false},{"letter":"b","text":"Nein, es ist Scheibenmunition.","correct":true}],"is_open":false,"open_answer":null,"page":9},{"id":"1.25","question":"Welche der hier genannten Gegenstände sind keine „wesentlichen Teile“ von Schusswaffen im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Wechseltrommel für Revolver","correct":false},{"letter":"b","text":"Klappschaft für Flinten","correct":true},{"letter":"c","text":"Ersatzmagazin für Büchsen","correct":true}],"is_open":false,"open_answer":null,"page":9},{"id":"1.26","question":"Welche der hier genannten Waffen ist ein Einzellader im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"halbautomatische Pistole","correct":false},{"letter":"b","text":"Doppelflinte","correct":true},{"letter":"c","text":"Schreckschussrevolver","correct":false}],"is_open":false,"open_answer":null,"page":10},{"id":"1.27","question":"Welche der hier genannten Waffen sind Mehrlader im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Double-Action-Revolver","correct":true},{"letter":"b","text":"Repetierbüchse","correct":true},{"letter":"c","text":"Doppelflinte","correct":false}],"is_open":false,"open_answer":null,"page":10},{"id":"1.28","question":"Zu welcher Waffenart im Sinne des Waffengesetzes zählt eine Unterhebel-Repetierbüchse (lever-action)?","options":[{"letter":"a","text":"Einzelladerwaffen","correct":false},{"letter":"b","text":"Repetierwaffen","correct":true},{"letter":"c","text":"halbautomatische Waffen","correct":false}],"is_open":false,"open_answer":null,"page":10},{"id":"1.29","question":"Was zählt zu den Geschossen im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Platzpatronen","correct":false},{"letter":"b","text":"Bleirundkugeln für Vorderlader","correct":true},{"letter":"c","text":"CO2 Kartuschen für Druckluftwaffen","correct":false}],"is_open":false,"open_answer":null,"page":10},{"id":"1.30","question":"Welche Arten von Munition unterscheidet das Waffengesetz?","options":[],"is_open":true,"open_answer":"Patronenmunition (Hülsen mit Treibladungen, die ein Geschoss enthalten und Geschosse mit Eigenantrieb) Kartuschenmunition (Hülsen mit Ladungen, die kein Geschoss enthalten) Pyrotechnische Munition (Munition, in der explosionsgefährliche Stoffe oder Stoffgemische enthalten sind, die einen Licht-, Schall-, Rauchoder ähnlichen Effekt erzeugen) Hülsenlose Munition (Treibladungen mit und ohne Geschosse)","page":10},{"id":"1.31","question":"Welche Munitionsarten sind vom Waffengesetz erfasst?","options":[{"letter":"a","text":"Patronenmunition","correct":true},{"letter":"b","text":"hülsenlose Munition","correct":true},{"letter":"c","text":"pyrotechnische Munition","correct":true}],"is_open":false,"open_answer":null,"page":10},{"id":"1.32","question":"Zur Munition im Sinne des Waffengesetzes zählen:","options":[{"letter":"a","text":"Stahlkugeln für Präzisionsschleudern","correct":false},{"letter":"b","text":"Patronenmunition Kaliber .38 Special","correct":true},{"letter":"c","text":".177 (4,5 mm) Rundkugeln","correct":false}],"is_open":false,"open_answer":null,"page":11},{"id":"1.33","question":"Welche der hier genannten Gegenstände sind Munition im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Hohlspitzgeschosse für Kurzwaffen","correct":false},{"letter":"b","text":"Armbrustbolzen","correct":false},{"letter":"c","text":"Schrotpatronen","correct":true}],"is_open":false,"open_answer":null,"page":11},{"id":"1.34","question":"Welcher der hier genannten Gegenstände ist keine Munition im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Geschosse für Druckluftgewehre (Diabolos)","correct":true},{"letter":"b","text":"Platzpatronen für Schreckschuss-waffen","correct":false},{"letter":"c","text":"Zündhütchen für Vorderladerwaffen mit Zündhütchenzündung (Perkussion)","correct":true}],"is_open":false,"open_answer":null,"page":11},{"id":"1.35","question":"Welche der nachfolgend genannten Beispiele sind Kartuschenmunition im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Platzpatronen","correct":true},{"letter":"b","text":"Munition mit Betäubungsmittel für die Distanzinjektion","correct":false},{"letter":"c","text":"Zentralfeuerpatronen mit wiederladbaren Hülsen","correct":false}],"is_open":false,"open_answer":null,"page":11},{"id":"1.36","question":"Was bedeutet „erwerben“ im Sinne des Waffengesetzes?","options":[],"is_open":true,"open_answer":"Das Erlangen der tatsächlichen Gewalt über die Schusswaffe.","page":11},{"id":"1.37","question":"Was bedeutet „erwerben“ einer Schusswaffe im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Abschluss eines Kaufvertrages","correct":false},{"letter":"b","text":"Einsetzen als Erbe im Testament","correct":false},{"letter":"c","text":"Erlangen der tatsächlichen Gewalt über die Waffe","correct":true}],"is_open":false,"open_answer":null,"page":11},{"id":"1.38","question":"Wer ist Erwerber einer Schusswaffe im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Der Dieb, der die Waffe stiehlt.","correct":true},{"letter":"b","text":"Derjenige, der in einem Waffengeschäft lediglich den Kaufvertrag für eine Waffe unterschreibt.","correct":false},{"letter":"c","text":"Der Finder, wenn er die Waffen an sich nimmt.","correct":true}],"is_open":false,"open_answer":null,"page":11},{"id":"1.39","question":"Sie wollen ihren Revolver mit dem Ihres Schützenkameraden dauerhaft tauschen, was müssen sie dabei beachten?","options":[{"letter":"a","text":"Beide haben eine Erlaubnis zum Erwerb (Voreintrag) der jeweiligen Waffe zu beantragen.","correct":true},{"letter":"b","text":"Die Waffen können getauscht werden. Dies ist aber der zuständigen Behörde innerhalb von 14 Tagen anzuzeigen.","correct":false},{"letter":"c","text":"Es handelt sich um ein gegenseitiges Überlassen und Erwerben.","correct":true}],"is_open":false,"open_answer":null,"page":12},{"id":"1.40","question":"Wann wird eine Schusswaffe im Sinne des Gesetzes erworben?","options":[{"letter":"a","text":"Bei unrechtmäßiger Aneignung.","correct":true},{"letter":"b","text":"Waffenrechtlicher Erwerb liegt erst bei behördlichem Eintrag der Waffe in die WBK vor.","correct":false},{"letter":"c","text":"Wenn der Waffenhändler dem Schützen die Waffe im Geschäft übergibt.","correct":true}],"is_open":false,"open_answer":null,"page":12},{"id":"1.41","question":"Wer erwirbt eine Waffe im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Jeder, der die tatsächliche Gewalt über die Waffe erlangt.","correct":true},{"letter":"b","text":"Jeder, der sich die Waffe für einen Zeitraum von weniger als 4 Wochen ausleiht.","correct":true},{"letter":"c","text":"Jeder, der die tatsächliche Gewalt über die Waffe ausübt.","correct":false}],"is_open":false,"open_answer":null,"page":12},{"id":"1.42","question":"Wann „erwirbt“ der Käufer eine Waffe im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Bei dem Abschluss eines Kaufvertrages.","correct":false},{"letter":"b","text":"Bei der Vorlage der Waffenbesitzkarte des Käufers zum Eintrag der Waffe bei seiner zuständigen Behörde.","correct":false},{"letter":"c","text":"Bei der Aushändigung der Waffe durch den Verkäufer.","correct":true}],"is_open":false,"open_answer":null,"page":12},{"id":"1.43","question":"Was bedeutet „Überlassen“ einer Schusswaffe?","options":[{"letter":"a","text":"Vererben einer Schusswaffe (nach dem Tod).","correct":false},{"letter":"b","text":"Wer einem anderen die tatsächliche Gewalt darüber einräumt.","correct":true},{"letter":"c","text":"Verleihen einer Vereinswaffe (für wenige Tage) an einen anderen Verein.","correct":true}],"is_open":false,"open_answer":null,"page":12},{"id":"1.44","question":"Wer ist sachkundig im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Derjenige, der vor einem Prüfungsausschuss die Sachkundeprüfung erfolgreich abgelegt hat.","correct":true},{"letter":"b","text":"Soldaten, die mehrere Jahre mit Wartung, Pflege und Lagerung von Handfeuerwaffen betraut waren.","correct":false},{"letter":"c","text":"Derjenige, der erfolgreich seine Gesellenprüfung im Büchsenmacherhandwerk abgelegt hat.","correct":true}],"is_open":false,"open_answer":null,"page":13},{"id":"1.45","question":"Was bedeutet „Führen“ im Sinne des Waffengesetzes?","options":[],"is_open":true,"open_answer":"Das Ausüben der tatsächlichen Gewalt außerhalb der eigenen Wohnung, Geschäftsräume, des eigenen befriedeten Besitztums oder einer Schießstätte.","page":13},{"id":"1.46","question":"„Führen“ im Sinne des Waffengesetzes bedeutet Ausübung der tatsächlichen Gewalt...","options":[{"letter":"a","text":"in der eigenen Wohnung.","correct":false},{"letter":"b","text":"außerhalb des eigenen befriedeten Besitztums.","correct":true},{"letter":"c","text":"durch den Waffenhändler im Geschäftsraum.","correct":false}],"is_open":false,"open_answer":null,"page":13},{"id":"1.47","question":"„Führen“ im Sinne des Waffengesetzes liegt vor, wenn die Waffe...","options":[{"letter":"a","text":"in der eigenen Wohnung im Holster getragen wird.","correct":false},{"letter":"b","text":"im Treppenhaus eines fremden Mehrfamilienhauses im Holster getragen wird.","correct":true},{"letter":"c","text":"im eigenen PKW in der offenen Seitenablage transportiert wird.","correct":true}],"is_open":false,"open_answer":null,"page":13},{"id":"1.48","question":"Durch wen und wie wird die waffenrechtliche Zuverlässigkeit einer Person festgestellt?","options":[{"letter":"a","text":"Die Zuverlässigkeit wird von der zuständigen Behörde geprüft.","correct":true},{"letter":"b","text":"Es werden Auskünfte aus dem Bundeszentralregister, dem zentralen staatsanwaltschaftlichen Verfahrensregister,  Stellungnahmen der örtlichen Polizeidienststelle, der Bundespolizei und des Zollkriminalamtseingeholt. Zudem werden Auskünfte bei den zuständigen Verfassungsschutzämtern eingeholt.","correct":true},{"letter":"c","text":"Die Zuverlässigkeit wird durch die persönliche Vorstellung bei der örtlichen Behörde festgestellt.","correct":false}],"is_open":false,"open_answer":null,"page":14},{"id":"1.49","question":"Wer ist im Sinne des Waffengesetzes in der Regel nicht mehr zuverlässig?","options":[{"letter":"a","text":"Jeder, der wegen einer vorsätzlich begangenen Straftat zu einer Geldstrafe von mindestens 60 Tagessätzen verurteilt wurde, wenn seit dem Eintritt der Rechtskraft der letzten Verurteilung fünf Jahre noch nicht verstrichen sind.","correct":true},{"letter":"b","text":"Jeder, der wegen der Begehung von zwei verschiedenen vorsätzlichen Straftaten mindestens zwei Mal zu einer Geldstrafen verurteilt wurde, wenn seit dem Eintritt der Rechtskraft der letzten Verurteilung fünf Jahre noch nicht verstrichen sind.","correct":false},{"letter":"c","text":"Jeder, der wegen einer vorsätzlichen Geschwindigkeitsüberschreitung seinen Führerschein für mehr als 60 Tage abgeben musste.","correct":false}],"is_open":false,"open_answer":null,"page":14},{"id":"1.50","question":"Wer ist im Sinne des Waffengesetzes nicht geeignet?","options":[{"letter":"a","text":"Jeder, bei dem Tatsachen die Annahme rechtfertigen, dass er abhängig von berauschenden Mitteln ist.","correct":true},{"letter":"b","text":"Jeder, der aus einem anerkannten Schießsportverband ausgeschlossen wurde.","correct":false},{"letter":"c","text":"Jeder, bei dem Tatsachen die Annahme rechtfertigen, dass er aufgrund in der Person liegender Umstände mit Waffen oder Munition unsachgemäß umgehen wird.","correct":true}],"is_open":false,"open_answer":null,"page":14},{"id":"1.51","question":"Durch wen und wie wird die persönliche Eignung einer Person festgestellt?","options":[],"is_open":true,"open_answer":"Die persönliche Eignung wird von der zuständigen Behörde geprüft; ggf. ist ein amtsoder fachärztliches oder fachpsychologisches Zeugnis beizubringen.","page":15},{"id":"1.52","question":"Wer verfügt im Sinne des Waffengesetzes nicht über die erforderliche persönliche Eignung zum Waffenbesitz.","options":[{"letter":"a","text":"Grundsätzlich alle Personen unter 25 Jahren, wenn sie kein amtsoder fachärztliches oder fachpsychologisches Zeugnis über ihre geistige und körperliche Eignung vorlegen können.","correct":false},{"letter":"b","text":"Personen, bei denen Tatsachen die Annahme rechtfertigen, dass sie psychisch krank oder debil sind.","correct":true},{"letter":"c","text":"Personen, bei denen Tatsachen die Annahme rechtfertigen, dass sie alkoholabhängig sind.","correct":true}],"is_open":false,"open_answer":null,"page":15},{"id":"1.53","question":"Was versteht man unter dem „Verbringen“ im Sinne des WaffG?","options":[{"letter":"a","text":"Waffen oder Munition verbringt, wer diese über die Grenze zum dortigen Verbleib oder mit dem Ziel des Besitzwechsels in den, durch den oder aus dem Geltungsbereich des WaffG zu einer anderen Person   oder zu sich selbst transportieren lässt oder selbst transportiert.","correct":true},{"letter":"b","text":"Waffen werden dauerhaft in einen anderen Mitgliedstaat mit einem Europäischen Feuerwaffenpass verbracht.","correct":false},{"letter":"c","text":"Waffen werden mit einem Europäischen Feuerwaffenpass zu einer Schießsportveranstaltung in einem anderen Mitgliedstaat mitgenommen.","correct":false}],"is_open":false,"open_answer":null,"page":15},{"id":"1.54","question":"Was versteht man unter dem Begriff „Europäischer Feuerwaffenpass“?","options":[{"letter":"a","text":"Einen europaweit gültigen Waffenschein für gefährdete Personen, die gegenüber dem Bundesverwaltungsamt ein besonderes Schutzbedürfnis glaubhaft gemacht haben.","correct":false},{"letter":"b","text":"Eine europaweit gültige Waffenbesitzkarte, die die Waffenmitnahme auf Reisen in Mitgliedstaaten der EU gestattet.","correct":false},{"letter":"c","text":"Ein von der EU standardisiertes Waffenbesitzdokument (gegebenenfalls ist vor der Einreise in einen anderen Mitgliedstaat dessen Erlaubnis zur Mitnahme einzuholen).","correct":true}],"is_open":false,"open_answer":null,"page":16},{"id":"1.55","question":"Eine Schusswaffe ist „zugriffsbereit“ im Sinne des Waffengesetzes, ...","options":[{"letter":"a","text":"wenn sie unmittelbar, also mit wenigen schnellen Handgriffen, in Anschlag gebracht werden kann.","correct":true},{"letter":"b","text":"wenn sie im abgeschlossenen Koffer im Kfz untergebracht ist.","correct":false},{"letter":"c","text":"wenn sie ungeladen in der verschlossenen Schublade liegt.","correct":false}],"is_open":false,"open_answer":null,"page":16},{"id":"1.56","question":"Wann ist eine Waffe „schussbereit“?","options":[],"is_open":true,"open_answer":"Wenn Sie geladen ist, d. h. dass Munition oder Geschosse in der Trommel, im in die Waffe eingefügten Magazin oder im Patronenoder Geschosslager sind, auch wenn sie nicht gespannt ist.","page":16},{"id":"1.57","question":"Wann ist eine Waffe „zugriffsbereit“ (im Sinne des WaffG)?","options":[],"is_open":true,"open_answer":"Wenn sie unmittelbar, also mit wenigen schnellen Handgriffen in Anschlag gebracht werden kann.","page":16},{"id":"1.58","question":"Wann ist eine Schusswaffe im Sinne des Waffengesetzes „schussbereit“?","options":[{"letter":"a","text":"Wenn sie griffbereit, aber ungeladen im Holster getragen wird.","correct":false},{"letter":"b","text":"Wenn das Schlagstück / der Schlagbolzen bei entladener Waffe gespannt und entsichert ist.","correct":false},{"letter":"c","text":"Wenn sie geladen ist.","correct":true}],"is_open":false,"open_answer":null,"page":16},{"id":"1.59","question":"Wann ist eine Waffe „schussbereit“ im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Wenn die Waffe geladen und gespannt ist.","correct":true},{"letter":"b","text":"Wenn die Waffe geladen, aber entspannt und gesichert ist.","correct":true},{"letter":"c","text":"Wenn ein gefülltes Magazin eingeführt ist.","correct":true},{"letter":"d","text":"Wenn das gefüllte Magazin griffbereit liegt.","correct":false}],"is_open":false,"open_answer":null,"page":17},{"id":"1.60","question":"Wann ist eine Waffe „schussbereit“ im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Wenn sie ungeladen im Holster getragen wird.","correct":false},{"letter":"b","text":"Wenn sie in einem verschlossenen Koffer liegt und sich eine Patrone im Patronenlager befindet.","correct":true},{"letter":"c","text":"Wenn das Magazin in der Waffe mit Patronen gefüllt ist und die Waffe im unverschlossenen Handschuhfach eines PKW liegt.","correct":true}],"is_open":false,"open_answer":null,"page":17},{"id":"1.61","question":"Was bedeutet „schießen“ im Sinne des Waffengesetzes?","options":[],"is_open":true,"open_answer":"Im Sinne des WaffG schießt jemand, der mit einer Schusswaffe ein Geschoss durch einen Lauf verschießt, Kartuschenmunition abschießt, mit Patronenoder Kartuschenmunition Reizoder andere Wirkstoffe verschießt oder pyrotechnische Munition verschießt.","page":17},{"id":"1.62","question":"Welche Erlaubnis berechtigt zum Schießen mit Schreckschuss-, Reizstoffund Signalwaffen (mit Zulassungszeichen PTB im Kreis) außerhalb des eigenen befriedeten Besitztums?","options":[{"letter":"a","text":"Kleiner Waffenschein","correct":false},{"letter":"b","text":"behördliche Schießerlaubnis","correct":true},{"letter":"c","text":"Waffenbesitzkarte","correct":false}],"is_open":false,"open_answer":null,"page":17},{"id":"1.63","question":"Was bedeutet für einen Sportschützen der Rechtsbegriff „Zu einem vom Bedürfnis umfassten Zweck oder im Zusammenhang damit“ in Bezug auf den Transport einer Schusswaffe?","options":[{"letter":"a","text":"Der Schütze darf die Waffe in der fremden Wohnung mit Einwilligung des Hausrechtsinhabers zu Schutzzwecken führen.","correct":false},{"letter":"b","text":"Der Schütze transportiert seine defekte Schusswaffe zur Reparatur zum Büchsenmacher.","correct":true},{"letter":"c","text":"Die Schusswaffe wird am Wohnort des Schützen von ihm über mehrere Tage in einem Autotresor im Kofferraum des PKWs transportiert.","correct":false}],"is_open":false,"open_answer":null,"page":18},{"id":"1.64","question":"Welche Voraussetzungen müssen gegeben sein, damit der Rechtsbegriff „sportliches Schießen“ erfüllt wird?","options":[{"letter":"a","text":"Sportliches Schießen liegt dann vor, wenn nach festen Regeln einer genehmigten Sportordnung geschossen wird.","correct":true},{"letter":"b","text":"Sportliches Schießen liegt dann vor, wenn nach einer nicht genehmigten Sportordnung geschossen wird.","correct":false},{"letter":"c","text":"Sportliches Schießen liegt dann vor, wenn man in einer Gruppe Paintball spielt.","correct":false}],"is_open":false,"open_answer":null,"page":18},{"id":"1.65","question":"In welchem zeitlichen Mindestabstand werden die Inhaber waffenrechtlicher Erlaubnisse erneut auf ihre Zuverlässigkeit und ihre persönliche Eignung geprüft?","options":[],"is_open":true,"open_answer":"Mindestens alle drei Jahre.","page":18},{"id":"1.66","question":"Welche Voraussetzungen müssen Sie als Antragsteller für die Erteilung einer Waffenbesitzkarte erfüllen?","options":[],"is_open":true,"open_answer":"1. Ich muss ein Bedürfnis nachweisen. 2. Ich muss die persönliche Eignung besitzen. 3. Ich muss die erforderliche Zuverlässigkeit besitzen. 4. Ich muss die erforderliche Sachkunde nachweisen. 5. Ich muss das 18. Lebensjahr vollendet haben.(Beachte: Altersbeschränkungen bei Sportschützen) 6. Nachweise der sicheren Aufbewahrung für Schusswaffen.","page":18},{"id":"1.67","question":"Welche Angaben zu einer Waffe werden in einer Waffenbesitzkarte eintragen?","options":[{"letter":"a","text":"Waffenart, Bezeichnung der Munition oder des Kalibers, Hersteller/ Warenzeichen oder Marke, Modellbezeichnung, Herstellungsnummer und Tag des Überlassens, sowie der Name und die Anschrift des Überlassers.","correct":true},{"letter":"b","text":"Waffenart, Kaliber, Herstelleroder Warenzeichen, Beschusszeichen, Seriennummer und Tag des Überlassens, sowie der Name und die Personalausweisnummer des Überlassers.","correct":false},{"letter":"c","text":"Waffenart, Kaliber, Herstelleroder Warenzeichen, Nummer der Waffenherstellungserlaubnis und Tag des Überlassens, sowie der Name und die Waffenbesitzkartennummer des Überlassers.","correct":false}],"is_open":false,"open_answer":null,"page":19},{"id":"1.68","question":"Für die Anerkennung eines Bedürfnisses zum Erwerb und Besitz von Schusswaffen (grüne Waffenbesitzkarte) ist bei Sportschützen die Vorlage einer Bescheinigung des anerkannten Schießsportverbandes erforderlich, dem der Antragsteller durch seine Vereinsmitgliedschaft angehört. Die Bescheinigung muss ausweisen, dass ...","options":[{"letter":"a","text":"er seit mindestens 12 Monaten den Schießsport in einem Verein regelmäßig als Sportschütze betreibt.","correct":true},{"letter":"b","text":"er seine Sammlung vervollständigen möchte.","correct":false},{"letter":"c","text":"die Waffe für eine Disziplin nach der Sportordnung des Schießsportverbandes zugelassen und erforderlich ist.","correct":true}],"is_open":false,"open_answer":null,"page":19},{"id":"1.69","question":"Wann wird in der Regel eine waffenrechtliche Erlaubnis von der Erlaubnisbehörde widerrufen?","options":[{"letter":"a","text":"Wenn der Inhaber nicht mehr zuverlässig im Sinne des Waffengesetzes ist.","correct":true},{"letter":"b","text":"Wenn der Inhaber kein Bedürfnis mehr nachweisen kann.","correct":true},{"letter":"c","text":"Wenn der Inhaber seinen Wohnort in ein anderes Bundesland verlegt.","correct":false}],"is_open":false,"open_answer":null,"page":19},{"id":"1.70","question":"Welche Eintragungen sieht die grüne Waffenbesitzkarte zum Erwerb einer Schusswaffe vor?","options":[],"is_open":true,"open_answer":"Laufende Nummer, Art, Bezeichnung der Munition oder des Kalibers, Dauer der Erwerbsberechtigung und Dienstsiegel.","page":19},{"id":"1.71","question":"Wie lange gilt grundsätzlich eine Waffenbesitzkarte?","options":[],"is_open":true,"open_answer":"Unbefristet.","page":19},{"id":"1.72","question":"Kann eine Waffenbesitzkarte auch nachträglich mit Auflagen versehen werden?","options":[],"is_open":true,"open_answer":"Ja.","page":20},{"id":"1.73","question":"Kann eine Waffenbesitzkarte auch einem Schützenverein erteilt werden?","options":[{"letter":"a","text":"Ja, wenn es sich um einen eingetragenen Verein handelt.","correct":true},{"letter":"b","text":"Nein.","correct":false},{"letter":"c","text":"Ja, jedem Verein.","correct":false}],"is_open":false,"open_answer":null,"page":20},{"id":"1.74","question":"Wie lange gilt üblicherweise ein Voreintrag zum Erwerb einer Schusswaffe in einer grünen Waffenbesitzkarte?","options":[{"letter":"a","text":"6 Monate","correct":false},{"letter":"b","text":"1 Jahr","correct":true},{"letter":"c","text":"unbefristet","correct":false}],"is_open":false,"open_answer":null,"page":20},{"id":"1.75","question":"Wie lange gilt der Kleine Waffenschein?","options":[{"letter":"a","text":"1 Jahr","correct":false},{"letter":"b","text":"3 Jahre","correct":false},{"letter":"c","text":"unbefristet","correct":true}],"is_open":false,"open_answer":null,"page":20},{"id":"1.76","question":"Für wie lange wird ein Waffenschein höchstens erteilt?","options":[{"letter":"a","text":"1 Jahr","correct":false},{"letter":"b","text":"3 Jahre","correct":true},{"letter":"c","text":"5 Jahre","correct":false}],"is_open":false,"open_answer":null,"page":20},{"id":"1.77","question":"Was ist Voraussetzung für den Erwerb von Schreckschuss-, Reizstoffund Signalwaffen, deren Erwerb und Besitz erlaubnisfrei ist? c","text":"besonders vertrauenswürdigen Personen (z.B. Notar, Pfarrer)","correct":false}],"is_open":false,"open_answer":null,"page":37},{"id":"2.63","question":"Wer benötigt keinen Waffenschein?","options":[{"letter":"a","text":"Derjenige, der eine erlaubnispflichtige Kurzwaffe als Bewachungsunternehmer im Rahmen seiner Tätigkeit führt.","correct":false},{"letter":"b","text":"Derjenige, der eine erlaubnispflichtige Kurzwaffe während einer traditionellen Brauchtumsveranstaltung (z.B. Schützenaufmarsch) führt.","correct":false},{"letter":"c","text":"Derjenige, der als Inhaber eines gültigen Jagdscheins eine erlaubnispflichtige Kurzwaffe während der berechtigten Jagdausübung führt.","correct":true}],"is_open":false,"open_answer":null,"page":38},{"id":"2.64","question":"Was darf der Inhaber eines Kleinen Waffenscheins?","options":[{"letter":"a","text":"Schreckschuss-, Reizstoffund Signalwaffen mit dem Zulassungszeichen „PTB im Kreis“ in der Öffentlichkeit (ausgenommen öffentliche Veranstaltungen) führen.","correct":true},{"letter":"b","text":"Druckluftund CO2-Waffen mit dem Zulassungszeichen „F im Fünfeck“ in der Öffentlichkeit (ausgenommen öffentliche Veranstaltungen) führen.","correct":false},{"letter":"c","text":"Erlaubnispflichtige Schusswaffen lediglich vorübergehend, höchstens aber für einen Monat von einem Berechtigen zur sicheren Lagerung übernehmen.","correct":false}],"is_open":false,"open_answer":null,"page":38},{"id":"2.65","question":"Wozu berechtigt der Kleine Waffenschein?","options":[{"letter":"a","text":"Zum Erwerb von Schreckschuss-, Reizstoffund Signalwaffen, sofern diese das Zulassungszeichen „PTB im Kreis“ tragen.","correct":false},{"letter":"b","text":"Zum Besitz von Schreckschuss-, Reizstoffund Signalwaffen, sofern diese das Zulassungszeichen „PTB im Kreis“ tragen.","correct":false},{"letter":"c","text":"Zum Führen von Schreckschuss-, Reizstoffund Signalwaffen, sofern diese das Zulassungszeichen „PTB im Kreis“ tragen.","correct":true}],"is_open":false,"open_answer":null,"page":39},{"id":"2.66","question":"Welche Erlaubnisse berechtigen zum zugriffsbereiten Führen außerhalb der eigenen Wohnung, der eigenen Geschäftsräume und des eigenen befriedeten Besitztums einer Druckluftwaffe (mit Zulassungszeichen „F im Fünfeck“)?","options":[{"letter":"a","text":"Kleiner Waffenschein in Verbindung mit einem gültigen Ausweis","correct":false},{"letter":"b","text":"Waffenbesitzkarte in Verbindung mit Sportschützenausweis","correct":false},{"letter":"c","text":"Waffenschein oder behördliche Ausnahmegenehmigung","correct":true}],"is_open":false,"open_answer":null,"page":39},{"id":"2.67","question":"Welche Gegenstände dürfen grundsätzlich nicht in der Öffentlichkeit geführt werden?","options":[{"letter":"a","text":"Anscheinswaffen (originalgetreue Imitate von Feuerwaffen)","correct":true},{"letter":"b","text":"Schweizer Taschenmesser und Gurtschneider","correct":false},{"letter":"c","text":"Feststehende Messer mit einer Klingenlänge über 12 cm und Einhandmesser","correct":true}],"is_open":false,"open_answer":null,"page":39},{"id":"2.68","question":"Unter welchen Voraussetzungen dürfen Hiebund Stoßwaffen, feststehende Messer mit einer Klingenlänge über 12 cm und Einhandmesser ausnahmsweise in der Öffentlichkeit geführt werden?","options":[{"letter":"a","text":"Für den Fall, dass man sich irgendwann einmal selbst verteidigen muss.","correct":false},{"letter":"b","text":"Beim Transport in einem verschlossenen Behältnis.","correct":true},{"letter":"c","text":"Sofern ein berechtigtes Interesse am Führen vorliegt (z. B. im Zusammenhang mit der Berufsausübung, der Brauchtumspflege, dem Sport oder einem allgemein anerkannten Zweck).","correct":true}],"is_open":false,"open_answer":null,"page":39},{"id":"2.69","question":"Wer benötigt einen Waffenschein?","options":[{"letter":"a","text":"Wer eine erlaubnispflichtige Schusswaffe besitzt.","correct":false},{"letter":"b","text":"Wer als Berechtigter mehr als drei Waffen zum Schießstand transportieren will.","correct":false},{"letter":"c","text":"Wer eine Schusswaffe außerhalb der eigenen Wohnung, Geschäftsräume, des befriedeten Besitztums oder der Schießstätte zugriffsbereit führen möchte.","correct":true}],"is_open":false,"open_answer":null,"page":40},{"id":"2.70","question":"Zum Führen welcher Waffen benötigt man keine Erlaubnis?","options":[{"letter":"a","text":"Waffen mit dem Zeichen","correct":false},{"letter":"b","text":"Reizstoff-Sprühdosen mit dem Zeichen","correct":true},{"letter":"c","text":"Waffen mit dem Zeichen","correct":false}],"is_open":false,"open_answer":null,"page":40},{"id":"2.71","question":"Für welche Art des Umgangs mit Schusswaffen benötigt man einen Waffenschein?","options":[{"letter":"a","text":"Transport einer erlaubnispflichtigen Waffe zum Schießstand","correct":false},{"letter":"b","text":"Selbstschutz zu Hause","correct":false},{"letter":"c","text":"Zugriffsbereites Führen einer erlaubnispflichtigen Waffe auf der Straße","correct":true}],"is_open":false,"open_answer":null,"page":40},{"id":"2.72","question":"Als Erlaubnis zum zugriffsbereiten Führen einer Waffe braucht man den Kleinen Waffenschein für...","options":[{"letter":"a","text":"Druckluft-, Federdruck-, CO Waffen. 2","correct":false},{"letter":"b","text":"Schreckschuss-, Reizstoff-, Signalwaffen mit dem Zeichen „PTB im Kreis“ (PTB = Physikalisch-Technische Bundesanstalt).","correct":true},{"letter":"c","text":"Feuerwaffen, die nicht zugriffsund nicht schussbereit transportiert werden.","correct":false}],"is_open":false,"open_answer":null,"page":40},{"id":"2.73","question":"Wie ist eine Schusswaffe von der Wohnung zu der Schießstätte zu transportieren, wenn kein Waffenschein erteilt wurde?","options":[],"is_open":true,"open_answer":"Beim Transport darf die Waffe nicht zugriffsbereit und nicht schussbereit sein.","page":41},{"id":"2.74","question":"a) Welche Signalwaffen können erlaubnisfrei erworben werden? b) Dürfen diese zugriffsbereit geführt werden?","options":[],"is_open":true,"open_answer":"Keine Antwort im Dokument markiert - bitte im Fragenkatalog nachschlagen.","page":41},{"id":"2.75","question":"Benötigen Jäger zur befugten Jagdausübung einen Waffenschein?","options":[],"is_open":true,"open_answer":"Nein","page":41},{"id":"2.76","question":"Wer benötigt einen Waffenschein?","options":[{"letter":"a","text":"Wer eine „scharfe“ Waffe zu Hause führt.","correct":false},{"letter":"b","text":"Wer eine Druckluftpistole unverpackt auf dem Rücksitz im PKW mitnimmt.","correct":true},{"letter":"c","text":"Wer mit der Armbrust auf einem Feld schießt.","correct":false}],"is_open":false,"open_answer":null,"page":41},{"id":"2.77","question":"Bei welcher der nebenstehend aufgeführten Schusswaffen benötigt man einen Waffenschein, wenn man sie außerhalb der Wohnung zugriffsbereit „bei sich“ hat?","options":[{"letter":"a","text":"doppelläufiges Steinschlossgewehr (Modell vor 1871)","correct":false},{"letter":"b","text":"Druckluftpistole mit einer Mündungsenergie bis zu 7,5 Joule","correct":true},{"letter":"c","text":"Steinschloss-Duellpistole (Modell vor 1871)","correct":false}],"is_open":false,"open_answer":null,"page":41},{"id":"2.78","question":"Einer Erlaubnis zum Führen einer erlaubnispflichtigen Schusswaffe bedarf nicht,","options":[{"letter":"a","text":"wer diese beim Schießen auf Schießstätten zu einem vom Bedürfnis umfassten Zweck oder im Zusammenhang damit verwendet.","correct":true},{"letter":"b","text":"wer die Waffe als Sportschütze unverpackt auf dem PKW-Rücksitz zum Büchsenmacher bringt.","correct":false},{"letter":"c","text":"wer die Waffe seinen Freunden auf der Straße zeigt.","correct":false}],"is_open":false,"open_answer":null,"page":41},{"id":"2.79","question":"Benötigen Sie zum Führen einer Druckluftpistole (mit Kennzeichnung „F im Fünfeck“) im Gürtelholster einen Waffenschein?","options":[{"letter":"a","text":"Ja","correct":true},{"letter":"b","text":"Nein","correct":false},{"letter":"c","text":"Nur, wenn ich noch nicht volljährig bin.","correct":false}],"is_open":false,"open_answer":null,"page":42},{"id":"2.80","question":"Welcher der genannten Gegenstände darf nicht ohne weiteres geführt werden?","options":[{"letter":"a","text":"Baseballschläger","correct":false},{"letter":"b","text":"Klappmesser mit 14 cm langer, nicht feststellbarer einseitig geschliffener Klinge.","correct":false},{"letter":"c","text":"Kochmesser mit 14 cm langer Klinge.","correct":true},{"letter":"d","text":"Samuraischwert","correct":true},{"letter":"e","text":"Schlagstock","correct":true}],"is_open":false,"open_answer":null,"page":42},{"id":"2.81","question":"Ist der Umgang mit sogenannten Pfeilabschussgeräten im Sinne des Waffengesetzes erlaubnispflichtig und der Eintrag in eine Waffenbesitzkarte erforderlich?","options":[{"letter":"a","text":"Ja, da Pfeilabschussgeräte nicht in der Anlage 2 Unterabschnitt 2 -erlaubnisfreie Arten des Umgangsgenannt sind.","correct":true},{"letter":"b","text":"Nein, sie sind waffenrechtlich wie Armbrüste einzuordnen.","correct":false}],"is_open":false,"open_answer":null,"page":42},{"id":"2.82","question":"Um Ihre Vorderschaftrepetierflinte leichter transportieren zu können ersetzen Sie den normalen Schaft durch einen Pistolengriff.","options":[{"letter":"a","text":"Das ist verboten.","correct":true},{"letter":"b","text":"Änderungen am Schaft sind zulässig, wenn die Waffe danach noch mindestens 61 cm lang ist.","correct":false},{"letter":"c","text":"Das ist nur Jägern erlaubt.","correct":false}],"is_open":false,"open_answer":null,"page":42},{"id":"2.83","question":"Welche Legitimationspapiere sind beim Transport einer erlaubnispflichtigen Schusswaffe durch einen Sportschützen mitzuführen?","options":[{"letter":"a","text":"Personal-/Reisepass und Schützenausweis","correct":false},{"letter":"b","text":"Waffenbesitzkarte und Waffenschein","correct":false},{"letter":"c","text":"Personalausweis oder Reisepass und Waffenbesitzkarte","correct":true}],"is_open":false,"open_answer":null,"page":42},{"id":"2.84","question":"Welche Dokumente muss ein Sportschütze mitführen, der a) seine eigene erlaubnispflichtige Waffe zum Schießstand führt (nicht zugriffsbzw. schussbereit) b) die erlaubnispflichtige Waffe eines anderen zum Schießstand führt (nicht zugriffsbzw. schussbereit)?","options":[],"is_open":true,"open_answer":"Keine Antwort im Dokument markiert - bitte im Fragenkatalog nachschlagen.","page":43},{"id":"2.85","question":"Welche Dokumente benötigen Sie zum zugriffsbereiten Führen einer bauartzugelassenen Schreckschusswaffe?","options":[{"letter":"a","text":"Keine Dokumente erforderlich, da der Erwerb ja auch genehmigungsfrei ist.","correct":false},{"letter":"b","text":"Kleiner Waffenschein und Personalausweis oder Reisepass","correct":true},{"letter":"c","text":"Waffenbesitzkarte und Personalausweis oder Reisepass","correct":false}],"is_open":false,"open_answer":null,"page":43},{"id":"2.86","question":"Der Transport einer KleinkaliberSportpistole durch einen WBK-Inhaber bedarf keiner Erlaubnis, wenn diese…","options":[{"letter":"a","text":"im nicht einsehbaren Handschuhfach eines Pkw befördert wird.","correct":false},{"letter":"b","text":"versteckt am Körper getragen wird.","correct":false},{"letter":"c","text":"ungeladen im verschlossenen Waffenkoffer befördert wird, wenn der Transport zu einem vom Bedürfnis umfassten Zweck erfolgt.","correct":true}],"is_open":false,"open_answer":null,"page":43},{"id":"2.87","question":"Darf ein Anderer als der WBK-Inhaber dessen Kurzwaffe zur Instandsetzung zum Waffengeschäft bringen?","options":[{"letter":"a","text":"Ja, wenn er Inhaber einer WBK ist oder die Waffe gewerblich transportiert.","correct":true},{"letter":"b","text":"Nein, das ist nicht erlaubt.","correct":false},{"letter":"c","text":"Das muss immer erst bei der Behörde beantragt werden.","correct":false}],"is_open":false,"open_answer":null,"page":43},{"id":"2.88","question":"Sie wollen den defekten Lauf ihrer Pistole zum Waffenhändler bringen. Wie nehmen sie ihn waffenrechtlich einwandfrei mit?","options":[],"is_open":true,"open_answer":"Bei einem Lauf handelt es sich um ein wesentliches Teil einer Waffe. Diese stehen den Schusswaffen gleich. Der Lauf ist deshalb nicht zugriffsbereit zu transportieren.","page":43},{"id":"2.89","question":"Was ist beim Transport einer Schusswaffe von der Wohnung zur Schießstätte zu beachten?","options":[],"is_open":true,"open_answer":"Beim Transport darf die Waffe nicht schussbereit und nicht zugriffsbereit sein. Der Transport darf nur zum vom Bedürfnis umfassten Zweck erfolgen.","page":43},{"id":"2.90","question":"Erlaubnisfreies Führen im Sinne des Waffengesetzes liegt vor, wenn man als WBK-Inhaber die Waffe...","options":[{"letter":"a","text":"bei einer Schützenhochzeit zum Spalier stehen verwendet.","correct":false},{"letter":"b","text":"im verschlossenen Kofferraum des PKW, ungeladen und verpackt zum Schießstand fährt.","correct":true},{"letter":"c","text":"im verschlossenen Waffenkoffer zum Büchsenmacher transportiert.","correct":true}],"is_open":false,"open_answer":null,"page":44},{"id":"2.91","question":"Unter welchen Voraussetzungen darf man in einem fremden Besitztum eine Schusswaffe ohne Waffenschein bei sich haben?","options":[],"is_open":true,"open_answer":"Unter der Voraussetzung, dass das Führen der Waffe vom Bedürfnis umfasst ist oder damit im Zusammenhang steht und der Hausrechtsinhaber zugestimmt hat.","page":44},{"id":"2.92","question":"Bedarf es zum Führen 1. einer nicht schussbereiten Waffe im unverschlossenen Handschuhfach     oder 2. einer schussbereiten Waffe im verschlossenen Handschuhfach eines Waffenscheines?","options":[],"is_open":true,"open_answer":"Zu 1: Ja Zu 2: Ja","page":44},{"id":"2.93","question":"Dürfen Teilnehmer an öffentlichen Veranstaltungen, insbesondere an Volksfesten und öffentlichen Vergnügungen, Waffen mit sich führen?","options":[],"is_open":true,"open_answer":"Nein, es sei denn, die zuständige Behörde hat allgemein oder für den Einzelfall eine Ausnahme zugelassen.","page":44},{"id":"2.94","question":"Brauchen Sie zum zugriffsbereiten Führen von Druckluft-, Federdruckoder CO2-Waffen in der Öffentlichkeit einen Waffenschein?","options":[],"is_open":true,"open_answer":"Ja (Der Kleine Waffenschein reicht nicht aus.)","page":44},{"id":"2.95","question":"Ist der Transport einer erlaubnispflichtigen Schusswaffe durch den WBK-Inhaber von der Wohnung zum Schießstand zulässig?","options":[{"letter":"a","text":"Nur mit Waffenschein.","correct":false},{"letter":"b","text":"Ja, wenn sie ungeladen und gesichert im Holster am Körper getragen wird.","correct":false},{"letter":"c","text":"Ja, wenn sie nicht zugriffsbereit und nicht schussbereit transportiert wird und dies vom Bedürfnis umfasst ist.","correct":true}],"is_open":false,"open_answer":null,"page":44},{"id":"2.96","question":"Eine Erlaubnis zum Führen einer Schusswaffe im Sinne des Waffengesetzes ist erforderlich, wenn","options":[{"letter":"a","text":"... sie entladen in der unverschlossenen Aktentasche mitgeführt wird.","correct":true},{"letter":"b","text":"... sie geladen in einer verschlossenen Aktentasche mitgeführt wird.","correct":true},{"letter":"c","text":"... sie sich entladen im unverschlossenen Handschuhfach eines PKW befindet und die Munition in einem Metallbehältnis mit Schwenkriegelschloss im Kofferraum mitgeführt wird.","correct":true}],"is_open":false,"open_answer":null,"page":45},{"id":"2.97","question":"Wer ist zum zugriffsbereiten Führen von Schreckschuss-, Reizstoffund Signalwaffen, deren Erwerb und Besitz erlaubnisfrei ist, berechtigt?","options":[],"is_open":true,"open_answer":"Inhaber des Kleinen Waffenscheines","page":45},{"id":"2.98","question":"Welche Schusswaffen bzw. sonstigen Waffen dürfen Sie bei öffentlichen Veranstaltungen „bei sich“ haben?","options":[{"letter":"a","text":"Erlaubt ist das Führen eines Schreckschussrevolvers, wenn ich den Kleinen Waffenschein habe.","correct":false},{"letter":"b","text":"Steinschlosspistole, weil diese nach dem WaffG ohnehin geführt werden darf.","correct":false},{"letter":"c","text":"Es dürfen keine Waffen im Sinne des § 1 Abs. 2 WaffG bei sich geführt werden.","correct":true}],"is_open":false,"open_answer":null,"page":45},{"id":"2.99","question":"Kann man eine im Ausland erworbene erlaubnispflichtige Schusswaffe in die Bundesrepublik einführen/verbringen?","options":[{"letter":"a","text":"Ja, ohne Einschränkung.","correct":false},{"letter":"b","text":"Ja, mit Waffenbesitzkarte.","correct":false},{"letter":"c","text":"Ja, mit Verbringungserlaubnissen der zuständigen Behörden.","correct":true}],"is_open":false,"open_answer":null,"page":45},{"id":"2.100","question":"Unter welchen Voraussetzungen darf man eine im Ausland erworbene Schusswaffe, die in der Bundesrepublik Deutschland erlaubnispflichtig ist, in das Bundesgebiet einführen?","options":[{"letter":"a","text":"Nur, wenn man im Besitz einer in Deutschland gültigen Waffenbesitzkarte mit Voreintrag ist.","correct":false},{"letter":"b","text":"Nur, wenn man im Besitz eines Europäischen Feuerwaffenpasses ist.","correct":false},{"letter":"c","text":"Nur, wenn man im Besitz der entsprechenden Verbringungserlaubnisse ist.","correct":true}],"is_open":false,"open_answer":null,"page":45},{"id":"2.101","question":"Was ist beim Verbringen von Schusswaffen über Staatsgrenzen immer zu beachten?","options":[{"letter":"a","text":"Beim Verbringen von Waffen nach Deutschland müssen vor Grenzübertritt die erforderlichen Erlaubnisse (z.B. Verbringungserlaubnis) vorliegen.","correct":true},{"letter":"b","text":"Beim Verbringen von Waffen aus Deutschland müssen vor Grenzübertritt die erforderlichen Erlaubnisse des Ziellandes, der Bundesrepublik Deutschland und ggf. aller Transitländer vorliegen.","correct":true},{"letter":"c","text":"Es genügt immer eine deutsche WBK.","correct":false}],"is_open":false,"open_answer":null,"page":46},{"id":"2.102","question":"Was muss ein Waffenbesitzer veranlassen, wenn er seine erlaubnispflichtige Schusswaffe in einem anderen Mitgliedsstaat der Europäischen Union verkaufen möchte?","options":[{"letter":"a","text":"Nichts, der Verkauf von erlaubnispflichtigen Schusswaffen in das europäische Ausland ist generell erlaubnisfrei.","correct":false},{"letter":"b","text":"Der Waffenbesitzer lässt sich die Erwerbserlaubnis des Käufers vorlegen und überlässt diesem dann die Waffe. Der Käufer meldet die Waffe nach Erhalt in seinem Heimatland an. Anschließend schickt er dem Verkäufer eine Kopie der Anmeldung, damit dieser die Waffe bei seiner Behörde abmelden kann.","correct":false},{"letter":"c","text":"Er bittet den Käufer um Übersendung einer Erlaubnis des Empfängerlandes zur Einfuhr der Waffe. Anschließend beantragt der Verkäufer bei seiner zuständigen Behörde eine Erlaubnis zum dauerhaften Verbringen der Waffe ins Ausland. Erst nach Erlaubniserteilung darf die Waffe verbracht werden. (Die Behörde meldet die Erteilung der Ausfuhrerlaubnis dem Bundesverwaltungsamt, EU-Meldedienst)","correct":true}],"is_open":false,"open_answer":null,"page":46},{"id":"2.103","question":"Darf man als Inhaber einer Waffenbesitzkarte eine im Ausland erworbene Schusswaffe in die Bundesrepublik Deutschland einführen?","options":[{"letter":"a","text":"Ja, aber nur wenn sich in der Waffenbesitzkarte ein entsprechender Voreintrag der zuständigen Erlaubnisbehörde befindet.","correct":false},{"letter":"b","text":"Ja, die Waffe ist innerhalb von 14 Tagen bei der zuständigen Erlaubnisbehörde anzumelden.","correct":false},{"letter":"c","text":"Nein, man benötigt vor der Einfuhr zunächst eine Verbringungserlaubnis seiner zuständigen Waffenbehörde und dann eine Verbringungserlaubnis des ausländischen Staates.","correct":true}],"is_open":false,"open_answer":null,"page":47},{"id":"2.104","question":"Wozu berechtigt der Europäische Feuerwaffenpass?","options":[],"is_open":true,"open_answer":"Zur Mitnahme der dort eingetragenen Feuerwaffen und für diese bestimmten Munition in einen anderen Mitgliedsstaat. Eventuell ist eine Genehmigung des Mitgliedstaates notwendig.","page":47},{"id":"2.105","question":"Wozu berechtigt mich der Europäische Feuerwaffenpass?","options":[{"letter":"a","text":"Zum dauerhaften Verbringen von Feuerwaffen in Mitgliedstaaten.","correct":false},{"letter":"b","text":"Zur Feuerwaffenmitnahme bei Reisen in Mitgliedstaaten, beispielsweise zur Teilnahme an schießsportlichen Veranstaltungen oder zur Jagd.","correct":true},{"letter":"c","text":"Zur Feuerwaffenmitnahme bei Reisen in Mitgliedstaaten, muss ich die Reise mindestens 14 Tage vorher meiner zuständigen Erlaubnisbehörde schriftlich anzeigen.","correct":false}],"is_open":false,"open_answer":null,"page":47},{"id":"2.106","question":"Wie können Feuerwaffen dauerhaft in einen anderen Mitgliedstaat verbracht werden?","options":[{"letter":"a","text":"Die Feuerwaffen können mit einem Europäischen Feuerwaffenpass verbracht werden.","correct":false},{"letter":"b","text":"Eine Verbringungserlaubnis zum Verbringen in einen Mitgliedstaat ist nicht erforderlich.","correct":false},{"letter":"c","text":"Durch vorherige Verbringungserlaubnis des Mitgliedsstaates und darauf folgend einer Verbringungserlaubnis der zuständigen deutschen Waffenbehörde.","correct":true}],"is_open":false,"open_answer":null,"page":47},{"id":"2.107","question":"Welche Handlung erfüllt einen Straftatbestand im Sinne des Waffengesetzes?","options":[{"letter":"a","text":"Feuerwaffen werden dauerhaft ohne entsprechende Erlaubnisse zum Verbringen in einen Mitgliedstaat verbracht.","correct":true},{"letter":"b","text":"Feuerwaffen werden ohne eine waffenrechtliche Erlaubnis zur Ausfuhr in einen Drittstaat verbracht.","correct":false},{"letter":"c","text":"Feuerwaffen werden mit einem Europäischen Feuerwaffenpasses dauerhaft in einen Mitgliedstaat verbracht.","correct":true}],"is_open":false,"open_answer":null,"page":48},{"id":"2.108","question":"Was ist bei einer dauerhaften Ausfuhr von Schusswaffen in einen Drittstaat zu beachten?","options":[{"letter":"a","text":"Es ist nichts zu beachten.","correct":false},{"letter":"b","text":"Es ist eine Ausfuhrerlaubnis der zuständigen Waffenbehörde erforderlich.","correct":false},{"letter":"c","text":"Außenwirtschaftsrechtliche Bestimmungen sind zu beachten (Bundesamt für Wirtschaft und Ausfuhrkontrolle (BAFA).","correct":true}],"is_open":false,"open_answer":null,"page":48},{"id":"2.109","question":"Berechtigt der Europäische Feuerwaffenpass zur Einfuhr von erlaubnispflichtiger Munition aus einem Mitgliedstaat, sofern die Munition dort von Ihnen berechtigterweise erworben wurde?","options":[{"letter":"a","text":"Ja","correct":false},{"letter":"b","text":"Nein. Eine Verbringungserlaubnis ist erforderlich.","correct":true},{"letter":"c","text":"Ja, aber nur wenn eine Waffe entsprechenden Kalibers in den EFP eingetragen ist.","correct":false}],"is_open":false,"open_answer":null,"page":48},{"id":"2.110","question":"Welche Waffen dürfen ohne Beschusszeichen einem anderen zum Schießen überlassen werden?","options":[{"letter":"a","text":"alle Schusswaffen","correct":false},{"letter":"b","text":"Grundsätzlich keine Schusswaffen, außer diejenigen, die vor dem 1. Januar 1891 hergestellt wurden oder für die von einem Beschussamt eine Bescheinigung darüber ausgestellt wurde, dass der Beschuss der Waffe nicht durchgeführt werden kann.","correct":true},{"letter":"c","text":"Doppelflinten","correct":false}],"is_open":false,"open_answer":null,"page":48},{"id":"2.111","question":"Dürfen Sie als Sportschütze mit einer Schusswaffe, die der Beschusspflicht unterliegt, auf dem Schießstand „Probeschüsse“ abgeben, wenn kein Beschussstempel angebracht ist?","options":[{"letter":"a","text":"Ja, das Probeschießen ist gestattet.","correct":false},{"letter":"b","text":"Nein, das ist niemals gestattet.","correct":true},{"letter":"c","text":"Solche Schüsse sind nur durch die verantwortliche Aufsicht zulässig.","correct":false}],"is_open":false,"open_answer":null,"page":49},{"id":"2.112","question":"Wann ist eine Waffe erneut zu beschießen?","options":[{"letter":"a","text":"Neuwaffen nach 15 Jahren, bei Gebrauchtwaffen nach 10 Jahren.","correct":false},{"letter":"b","text":"Ein Beschuss ist unter anderem dann erforderlich, wenn eine Waffe von einem gewerblichen Waffenhändler an einen Kunden verkauft wird.","correct":false},{"letter":"c","text":"Ein erneuter Beschuss muss immer dann erfolgen, wenn wesentliche Teile der Waffe verändert oder instand gesetzt wurden.","correct":true}],"is_open":false,"open_answer":null,"page":49},{"id":"2.113","question":"Ist die zuständige Erlaubnisbehörde zu unterrichten, wenn durch einen Büchsenmacher der Lauf ersetzt und die Waffe anschließend neu beschossen wurde?","options":[{"letter":"a","text":"Die Erlaubnisbehörde ist immer zu unterrichten.","correct":false},{"letter":"b","text":"Die Erlaubnisbehörde ist zu unterrichten, wenn ein wesentliches Teil erworben wurde.","correct":true},{"letter":"c","text":"Die Erlaubnisbehörde ist nie zu unterrichten.","correct":false}],"is_open":false,"open_answer":null,"page":49},{"id":"2.114","question":"Was bedeutet die Überstempelung eines Beschusszeichens mit einem „X“?","options":[{"letter":"a","text":"Die Waffe wurde in England erneut beschossen, es ist nur noch der englische Beschuss gültig.","correct":false},{"letter":"b","text":"Die Waffe wurde bei einer erneuten Beschussprüfung als nicht mehr beschusstauglich befunden, der bereits vorhandene Beschussstempel ist ungültig.","correct":true},{"letter":"c","text":"Die Waffe wurde für den Export nach Großbritannien erneut beschossen, da dort der deutsche Beschuss nicht gültig ist.","correct":false}],"is_open":false,"open_answer":null,"page":49},{"id":"2.115","question":"Wann ist eine Waffe erneut zum Beschuss vorzulegen?","options":[{"letter":"a","text":"ein neuer Lauf (kein Austauschlauf) wurde eingebaut","correct":true},{"letter":"b","text":"Sportgriffschalen wurden montiert","correct":f fe  im Kaliber 6 mm Flobert (kein F im Fünfeck auf der Waffe vorhanden) eine behördliche Erlaubnis?","options":[{"letter":"a","text":"Nein","correct":false},{"letter":"b","text":"Ja, außerhalb von Schießstätten.","correct":true},{"letter":"c","text":"Nicht auf dafür zugelassenen Schießstätten.","correct":true}],"is_open":false,"open_answer":null,"page":51},{"id":"2.120","question":"Wo darf man ohne Erlaubnis mit einem Gewehr im Kaliber .22lr schießen?","options":[{"letter":"a","text":"Im Wald","correct":false},{"letter":"b","text":"Außerhalb des befriedeten Besitztums","correct":false},{"letter":"c","text":"Auf dafür zugelassenen Schießstätten","correct":true}],"is_open":false,"open_answer":null,"page":51},{"id":"2.121","question":"Wann darf ein 14-jähriger mit dem Einverständnis des/der Sorgeberechtigten auf dem Schießstand mit einer Waffe für Randfeuerpatronen bis Kaliber 5,6 mm lfB (.22lr) und einer Mündungsenergie von maximal 200 Joule schießen?","options":[{"letter":"a","text":"Wenn der Schießstandbetreiber zustimmt.","correct":false},{"letter":"b","text":"Wenn der erforderlichen Aufsichtsperson das Einverständnis des/der Sorgeberechtigten vorliegt.","correct":true},{"letter":"c","text":"Wenn die behördliche Ausnahmegenehmigung vorliegt.","correct":false}],"is_open":false,"open_answer":null,"page":51},{"id":"2.122","question":"In welchem Alter darf ein Jugendlicher auf dem Schießstand, ohne unter einer besonderen Obhut (durch den/die Sorgeberechtigten oder der zur Kinderund Jugendarbeit für das Schießen geeigneten Aufsichtsperson) zu stehen, mit einem Kleinkaliber-Match-Gewehr schießen?","options":[{"letter":"a","text":"mit 12 Jahren","correct":false},{"letter":"b","text":"mit 14 Jahren","correct":false},{"letter":"c","text":"mit 17 Jahren","correct":true}],"is_open":false,"open_answer":null,"page":51},{"id":"2.123","question":"Mit welchen Waffen dürfen ein 13jähriger und ein 15-jähriger auf einer zugelassenen Schießstätte schießen?","options":[{"letter":"a","t
